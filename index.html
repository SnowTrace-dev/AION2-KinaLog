<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>키나로그</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="assets/favicon.ico" />
  <style>
    @font-face {
      font-family: "KinaLogFont";
      src: url("assets/NEXONLv1GothicRegular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #071527;
      --panel: #0f2138;
      --card: #102746;
      --card2: #0b1f38;
      --line: rgba(96, 165, 250, 0.46);
      --gold: #60a5fa;
      --gold2: #93c5fd;
      --text: #f8fafc;
      --muted: #9fb3c8;
      --danger: #f87171;
      --done: #4ade80;
      --body-bg: radial-gradient(circle at top, rgba(37, 99, 235, 0.38), transparent 34%), linear-gradient(180deg, #06101f 0%, var(--bg) 100%);
      --topbar-bg: transparent;
      --section-bg: rgba(15,33,56,.82);
      --card-bg: linear-gradient(180deg, rgba(16,39,70,.98), rgba(8,24,44,.98));
      --soft-bg: rgba(255,255,255,.05);
      --input-bg: #071527;
      --button-bg: linear-gradient(180deg, rgba(96,165,250,.22), rgba(37,99,235,.18));
      --shadow: 0 18px 50px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "KinaLogFont", "NEXON Lv1 Gothic", "Pretendard", "Malgun Gothic", sans-serif;
      background: var(--body-bg);
      color: var(--text);
      padding: 20px;
    }

    .app { max-width: 1640px; margin: 0 auto; }

    .topbar {
      padding: 16px 8px 18px;
      margin-bottom: 18px;
    }

    .brand-logo {
      display: block;
      width: min(700px, 90vw);
      max-height: 420px;
      object-fit: contain;
      margin: 0 auto;
      filter: drop-shadow(0 18px 34px rgba(37, 99, 235, .26));
    }

    .title {
      text-align: center;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--gold2);
      text-shadow: 0 0 14px rgba(37,99,235,.22);
    }


    .top-actions {
      margin-top: 2px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .week-range {
      margin-top: 0;
      text-align: right;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }

    .reset-countdown {
      margin-top: 4px;
      text-align: right;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }


    .utility-row {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .utility-row input[type="file"] { display: none; }

    .character-section, .weekly-section {
      border: 2px solid var(--line);
      background: var(--section-bg);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--gold2);
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-head .section-title { margin-bottom: 0; }

    .add-character-btn {
      min-width: 118px;
      padding: 9px 13px;
      color: var(--gold2);
    }

    .card-list {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-start;
      gap: 12px;
      padding: 4px 4px 10px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }

    .card-list.dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .card-list::-webkit-scrollbar { height: 8px; }
    .card-list::-webkit-scrollbar-thumb {
      background: rgba(37, 99, 235, .35);
      border-radius: 999px;
    }

    .card-list::before, .card-list::after {
      content: "";
      flex: 0 0 max(4px, calc((100% - 1692px) / 2));
    }

    .character-card {
      position: relative;
      flex: 0 0 272px;
      max-width: 272px;
      min-width: 272px;
      scroll-snap-align: center;
      border: 2px solid var(--line);
      background: var(--card-bg);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 14px 34px rgba(15,23,42,.10), inset 0 0 18px rgba(37,99,235,.04);
    }

    .card-header {
      position: relative;
      min-height: 30px;
      margin-bottom: 8px;
      padding: 0 48px;
    }

    .nickname {
      text-align: center;
      font-size: 19px;
      font-weight: 900;
      color: var(--gold2);
      line-height: 1.25;
      word-break: keep-all;
    }

    .power-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 10px;
      text-align: center;
    }

    .power-text {
      min-width: 0;
    }

    .power-value {
      color: var(--text);
      font-size: 15px;
      margin-left: 4px;
    }

    .energy-line {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .energy-box {
      width: 100%;
      background: var(--soft-bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px 10px;
      text-align: center;
      font-weight: 900;
    }

    .energy-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .energy-main {
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
    }

    .energy-main .bonus-value {
      color: var(--gold2);
      white-space: nowrap;
    }

    .energy-pill {
      background: var(--soft-bg);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .energy-pill b { color: var(--text); }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--button-bg);
      color: var(--text);
      padding: 6px 8px;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .undo-btn {
      border-color: rgba(141,227,160,.35);
      color: #d7ffe0;
      background: rgba(141,227,160,.10);
    }

    button:hover { filter: brightness(1.12); }

    .small-btn {
      padding: 4px 7px;
      font-size: 11px;
    }

    .delete-btn {
      border-color: rgba(255,142,124,.35);
      color: #ffd1ca;
      background: rgba(255,142,124,.12);
    }

    .card-header .delete-btn {
      position: absolute;
      top: 0;
      right: 0;
    }

    .card-header .edit-energy {
      position: absolute;
      top: 0;
      left: 0;
    }

    .order-buttons {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 0 0 8px;
    }

    .order-buttons button {
      min-width: 42px;
      color: var(--gold2);
    }

    .delete-task-btn {
      position: static;
      align-self: center;
      white-space: nowrap;
    }

    .charge-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 12px;
    }

    .charge-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
      font-size: 13px;
      color: var(--gold2);
    }

    .charge-btn img {
      width: 25px;
      height: 25px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255,230,150,.35));
    }

    .charge-btn.large img { width: 30px; height: 30px; }

    .homework-area {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .character-weekly-profit {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .character-weekly-profit b {
      color: var(--text);
      white-space: nowrap;
    }


    .homework-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .homework-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--gold2);
    }

    .add-task-panel {
      display: none;
      margin: 10px 0;
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--soft-bg);
      border-radius: 12px;
    }

    .add-task-panel.open { display: block; }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
      gap: 7px;
    }

    .task-choice {
      text-align: left;
      font-size: 13px;
      background: var(--soft-bg);
    }

    .homework-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .homework-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      background: var(--soft-bg);
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 7px;
    }

    .homework-item.dungeon-task {
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: start;
    }

    .task-main {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .dungeon-stack {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .dungeon-stack .task-label {
      flex: 0 0 auto;
      text-align: left;
    }

    .homework-item.done .task-label {
      color: var(--muted);
      text-decoration: line-through;
    }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--done);
    }

    .task-label { font-weight: 900; font-size: 12px; line-height: 1.25; }

    .task-select {
      width: 100%;
      max-width: 132px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 7px;
      font-family: inherit;
      font-weight: 900;
      font-size: 11px;
    }

    .homework-item { cursor: pointer; }
    .homework-item select, .homework-item button, .homework-item input { cursor: pointer; }

    .homework-item:not(.dungeon-task):hover {
      background: rgba(96,165,250,.10);
    }


    .weekly-shared {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      text-align: right;
    }

    .weekly-title {
      color: var(--gold2);
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 0;
      white-space: nowrap;
    }

    .weekly-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat-pill {
      border: 1px solid var(--line);
      background: var(--soft-bg);
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 900;
    }

    .profit-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .profit-box {
      border: 2px solid var(--line);
      background: var(--card-bg);
      border-radius: 14px;
      padding: 14px;
      min-height: 120px;
    }

    .profit-title {
      color: var(--gold2);
      font-weight: 900;
      margin-bottom: 9px;
    }

    .profit-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.055);
      font-weight: 800;
      color: var(--muted);
    }

    .profit-row b { color: var(--text); }

    .extra-profit-section {
      margin-top: 14px;
      border: 2px solid var(--line);
      background: var(--card-bg);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
    }

    .fold-title {
      list-style: none;
      color: var(--gold2);
      font-size: 14px;
      font-weight: 900;
      padding: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .fold-title::-webkit-details-marker { display: none; }

    .fold-title::after {
      content: "+";
      color: var(--gold2);
      font-size: 18px;
      line-height: 1;
    }

    details[open] > .fold-title::after { content: "−"; }

    .fold-body {
      padding: 0 13px 13px;
    }

    .extra-profit-title {
      color: var(--gold2);
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .preset-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .preset-chip-wrap {
      display: inline-flex;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(96,165,250,.10);
    }

    .preset-chip {
      border: 0;
      border-radius: 0;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--gold2);
      background: transparent;
    }

    .preset-delete {
      border: 0;
      border-left: 1px solid var(--line);
      border-radius: 0;
      padding: 7px 8px;
      font-size: 12px;
      color: #ffd1ca;
      background: rgba(255,142,124,.10);
    }

    .extra-profit-form {
      display: grid;
      grid-template-columns: 1.3fr 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .extra-profit-form input {
      width: 100%;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-family: inherit;
      font-weight: 900;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .extra-profit-form input::-webkit-outer-spin-button,
    .extra-profit-form input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .extra-profit-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.055);
      color: var(--muted);
      font-weight: 900;
    }

    .extra-profit-row b { color: var(--text); white-space: nowrap; }

    .total-profit {
      margin-top: 14px;
      text-align: right;
      color: var(--gold2);
      font-size: 22px;
      font-weight: 900;
    }

    .aether-note { display: none; }

    .history-section {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 15px;
    }

    .history-title {
      color: var(--gold2);
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .history-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.055);
      color: var(--muted);
      font-weight: 900;
    }

    .history-row b { color: var(--text); white-space: nowrap; }

    .history-detail {
      border-bottom: 1px solid rgba(255,255,255,.055);
    }

    .history-detail summary {
      list-style: none;
      cursor: pointer;
    }

    .history-detail summary::-webkit-details-marker { display: none; }

    .history-detail .history-row {
      border-bottom: 0;
    }

    .history-detail summary .history-row span::before {
      content: "▸ ";
      color: var(--gold2);
    }

    .history-detail[open] summary .history-row span::before { content: "▾ "; }

    .history-breakdown {
      padding: 0 0 10px 18px;
      display: grid;
      gap: 7px;
    }

    .history-subtitle {
      color: var(--gold2);
      font-size: 12px;
      font-weight: 900;
      margin-top: 6px;
    }

    .history-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .history-line b { color: var(--text); white-space: nowrap; }

    @media (max-width: 700px) {
      body { padding: 14px; }
      .character-card { flex: 0 0 88vw; min-width: 88vw; max-width: 88vw; }
      .profit-grid { grid-template-columns: 1fr; }
      .extra-profit-form { grid-template-columns: 1fr; }
      .homework-item, .homework-item.dungeon-task { grid-template-columns: auto 1fr auto; }
      .task-select { width: 100%; max-width: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <img class="brand-logo" src="assets/Logo.png" alt="키나로그" />
      <div class="top-actions">
        <div>
          <div id="weekRange" class="week-range"></div>
          <div id="resetCountdown" class="reset-countdown"></div>
        </div>
      </div>
    </section>

    <section class="character-section">
      <div class="section-head">
        <div class="section-title">캐릭터 명단</div>
        <button id="addCharacterButton" class="add-character-btn">+ 캐릭터 추가</button>
      </div>
      <div id="cardList" class="card-list"></div>

      <div class="weekly-shared">
        <div class="weekly-title">주간 누적 플레이 보상 조정</div>
        <div class="weekly-stats">
          <span class="stat-pill">원정 <b id="weeklyExpedition">0</b> / 84</span>
          <span class="stat-pill">초월 <b id="weeklyTranscend">0</b> / 56</span>
        </div>
      </div>
    </section>

    <section class="weekly-section">
      <div class="section-title">주간 수익</div>
      <div class="profit-grid">
        <div class="profit-box">
          <div class="profit-title">원정</div>
          <div id="expeditionProfit"></div>
        </div>
        <div class="profit-box">
          <div class="profit-title">초월</div>
          <div id="transcendProfit"></div>
        </div>
        <div class="profit-box">
          <div class="profit-title">성역</div>
          <div id="sanctumProfit"></div>
        </div>
      </div>
      <details class="extra-profit-section" id="extraProfitFold" open>
        <summary class="fold-title">추가 수익</summary>
        <div class="fold-body">
          <div id="extraProfitPresetList" class="preset-row"></div>
          <div class="extra-profit-form">
            <input id="extraProfitName" type="text" placeholder="항목명 예: 거래소 판매" />
            <input id="extraProfitAmount" type="text" inputmode="numeric" placeholder="키나" />
            <button id="addExtraProfit">추가</button>
          </div>
          <div id="extraProfitList"></div>
        </div>
      </details>
      <details class="extra-profit-section" id="expenseFold">
        <summary class="fold-title">지출</summary>
        <div class="fold-body">
          <div id="expensePresetList" class="preset-row"></div>
          <div class="extra-profit-form">
            <input id="expenseName" type="text" placeholder="항목명 예: 오드 구매, 버스비" />
            <input id="expenseAmount" type="text" inputmode="numeric" placeholder="키나" />
            <button id="addExpense">추가</button>
          </div>
          <div id="expenseList"></div>
        </div>
      </details>
      <div class="total-profit">총 수익 <span id="totalProfit">0</span> 키나</div>
      <div id="aetherRegenNote" class="aether-note"></div>
      <div class="history-section">
        <div class="history-title">역대 수익</div>
        <div id="profitHistory"></div>
      </div>
      <div class="utility-row">
        <button id="backupButton" class="small-btn">데이터 백업</button>
        <button id="restoreButton" class="small-btn">데이터 복원</button>
        <input id="restoreFile" type="file" accept="application/json,.json" />
      </div>
    </section>
  </main>

  <template id="characterTemplate">
    <article class="character-card">
      <div class="card-header">
        <button class="small-btn edit-energy">수정</button>
        <div class="nickname"></div>
        <button class="small-btn delete-btn delete-character">삭제</button>
      </div>
      <div class="power-row"><span class="power-text">전투력 <span class="power-value">0K</span></span> <button class="small-btn edit-power">수정</button></div>
      <div class="order-buttons">
        <button class="small-btn move-left">←</button>
        <button class="small-btn move-right">→</button>
      </div>

      <div class="energy-line">
        <div class="energy-box">
          <div class="energy-label">오드 에너지</div>
          <div class="energy-main"><span class="aether-value">0 / 840</span> <span class="bonus-value">(+0)</span></div>
        </div>
      </div>

      <div class="charge-buttons">
        <button class="charge-btn small-charge"><img src="assets/Small.png" alt=""> +10</button>
        <button class="charge-btn large large-charge"><img src="assets/Large.png" alt=""> +40</button>
      </div>

      <div class="homework-area">
        <div class="homework-top">
          <div class="homework-title">숙제 목록</div>
          <button class="small-btn toggle-add-task">+ 숙제 추가</button>
        </div>

        <div class="add-task-panel">
          <div class="task-grid"></div>
        </div>

        <div class="homework-list"></div>
      </div>

      <div class="character-weekly-profit">
        <span>주간 수익</span>
        <b class="character-profit-value">0 키나</b>
      </div>
    </article>
  </template>

  <script>
    const STORAGE_KEY = "aion2_weekly_checklist_v2";
    const TASKS = [
      "각성전", "지령서", "일일던전", "[원정]", "[초월]",
      "[성역] 루드라", "[성역] 바고트", "[성역] 칼드릭스",
      "[산들바람] 오드 에너지", "[산들바람] 펫 영혼결정",
      "[산들바람] 일던 도전권", "[산들바람] 일던 즉완권",
      "[산들바람] 악몽 즉완권", "[물질변환] 오드 에너지"
    ];

    const DUNGEON_TASKS = ["[원정]", "[초월]"];

    const DUNGEONS = {
      "[원정]": [
        { name: "4티어 보통", reward: 1200000 },
        { name: "4티어 어려움", reward: 1620000 },
        { name: "5티어 보통", reward: 1620000 },
        { name: "5티어 어려움", reward: 2010000 }
      ],
      "[초월]": [
        { name: "2티어 1단계", reward: 1200000 },
        { name: "2티어 2단계", reward: 1320000 },
        { name: "2티어 3단계", reward: 1410000 },
        { name: "2티어 4단계", reward: 1500000 },
        { name: "3티어 1단계", reward: 1500000 },
        { name: "3티어 2단계", reward: 1710000 },
        { name: "3티어 3단계", reward: 2010000 },
        { name: "3티어 4단계", reward: 2400000 }
      ]
    };

    const SANCTUM_REWARDS = {
      "[성역] 루드라": 2000000,
      "[성역] 바고트": 4000000,
      "[성역] 칼드릭스": 6000000
    };

    const state = {
      currentWeekKey: "",
      currentWeekLabel: "",
      lastAetherRegenAt: Date.now(),
      aetherRegenVersion: 13,
      characters: [],
      weeks: {},
      history: [],
      extraProfitPresets: [],
      expensePresets: []
    };

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function comma(n) {
      return Number(n || 0).toLocaleString();
    }

    function formatPower(value) {
      return `${Number(value || 0).toFixed(1)}K`;
    }

    function formatKoreanDate(date) {
      return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`;
    }

    function getWeekInfo(date = new Date()) {
      // AION2 주간 초기화 기준: 매주 수요일 오전 5시
      // 05:00 이전 시간은 아직 이전 주차로 본다.
      const shifted = new Date(date.getTime() - 5 * 60 * 60 * 1000);
      const day = shifted.getDay();
      const diffToWednesday = (day - 3 + 7) % 7;
      const start = new Date(shifted);
      start.setHours(5, 0, 0, 0);
      start.setDate(shifted.getDate() - diffToWednesday);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      const key = `${start.getFullYear()}-${String(start.getMonth() + 1).padStart(2, "0")}-${String(start.getDate()).padStart(2, "0")}`;
      const label = `${formatKoreanDate(start)} ~ ${formatKoreanDate(end)}`;
      const eraLabel = getEraWeekLabel(start);
      return { key, label, eraLabel, start, end };
    }

    function makeDate(year, month, day) {
      const date = new Date(year, month - 1, day);
      date.setHours(5, 0, 0, 0);
      return date;
    }

    function getEraWeekLabel(dateLike) {
      const date = dateLike instanceof Date ? dateLike : new Date(dateLike);
      const chapter1Start = makeDate(2026, 7, 1);
      const season3Start = makeDate(2026, 4, 8);
      const oneWeek = 7 * 24 * 60 * 60 * 1000;
      if (date.getTime() >= chapter1Start.getTime()) {
        return `챕터1 · ${Math.floor((date.getTime() - chapter1Start.getTime()) / oneWeek) + 1}주차`;
      }
      if (date.getTime() >= season3Start.getTime()) {
        return `시즌3 · ${Math.floor((date.getTime() - season3Start.getTime()) / oneWeek) + 1}주차`;
      }
      return `${formatKoreanDate(date)}`;
    }

    function getEraWeekLabelFromKey(key) {
      if (!key) return "기록";
      const [year, month, day] = key.split("-").map(Number);
      if (!year || !month || !day) return "기록";
      return getEraWeekLabel(makeDate(year, month, day));
    }

    function emptyWeek(label, eraLabel = "") {
      return { label, eraLabel, weeklyExpedition: 0, weeklyTranscend: 0, profit: {}, profitCount: {}, extraProfit: [], expense: [] };
    }

    function normalizeCharacter(character) {
      if (!character.tasks) character.tasks = [];
      if (!character.maxAether) character.maxAether = 840;
      if (typeof character.aether !== "number") character.aether = Number(character.aether || 0);
      if (typeof character.bonusAether !== "number") character.bonusAether = Number(character.bonusAether || 0);
      character.tasks.forEach(task => {
        if (!task.claimHistory) task.claimHistory = [];
        task.name = normalizeTaskName(task.name);
        if (task.name === "[원정]" && !task.selectedDungeon) task.selectedDungeon = DUNGEONS["[원정]"][0].name;
        if (task.name === "[초월]" && !task.selectedDungeon) task.selectedDungeon = DUNGEONS["[초월]"][0].name;
        delete task.current;
        delete task.max;
      });
    }

    function normalizeTaskName(taskName) {
      let name = String(taskName || "").trim();
      if (name.startsWith("[원정]")) return "[원정]";
      if (name.startsWith("[초월]")) return "[초월]";
      if (name === "일던") return "일일던전";
      name = name.replace(/일일던전 즉시완료권/g, "일던 즉완권");
      name = name.replace(/즉시완료권/g, "즉완권");
      return name;
    }

    function normalizeMoneyName(name) {
      return String(name || "").replace(/\s+/g, " ").trim();
    }

    function mergeMoneyRows(rows) {
      const merged = [];
      (rows || []).forEach(item => {
        const name = normalizeMoneyName(item.name);
        const amount = Number(item.amount || 0);
        if (!name || !amount) return;
        const existing = merged.find(row => row.name === name);
        if (existing) {
          existing.amount += amount;
        } else {
          merged.push({ id: item.id || uid(), name, amount });
        }
      });
      return merged;
    }

    function addOrMergeMoneyRow(rows, name, amount) {
      const cleanName = normalizeMoneyName(name);
      const existing = rows.find(item => normalizeMoneyName(item.name) === cleanName);
      if (existing) {
        existing.name = cleanName;
        existing.amount = Number(existing.amount || 0) + Number(amount || 0);
      } else {
        rows.push({ id: uid(), name: cleanName, amount: Number(amount || 0) });
      }
    }

    function normalizeWeek(week) {
      if (!week.profit) week.profit = {};
      if (!week.profitCount) week.profitCount = {};
      if (!week.extraProfit) week.extraProfit = [];
      if (!week.expense) week.expense = [];
      week.extraProfit = mergeMoneyRows(week.extraProfit);
      week.expense = mergeMoneyRows(week.expense);
      if (typeof week.weeklyExpedition !== "number") week.weeklyExpedition = 0;
      if (typeof week.weeklyTranscend !== "number") week.weeklyTranscend = 0;
      if (!week.eraLabel) week.eraLabel = getEraWeekLabelFromKey(Object.keys(state.weeks || {}).find(key => state.weeks[key] === week));
      // 예전 버전 호환용. 캐릭터는 이제 주차 데이터가 아니라 전역 데이터로 보관한다.
      delete week.characters;
    }

    function normalizePresets() {
      if (!Array.isArray(state.extraProfitPresets)) state.extraProfitPresets = [];
      if (!Array.isArray(state.expensePresets)) state.expensePresets = [];
      state.extraProfitPresets = [...new Set(state.extraProfitPresets.map(v => String(v || "").trim()).filter(Boolean))];
      state.expensePresets = [...new Set(state.expensePresets.map(v => String(v || "").trim()).filter(Boolean))];
    }

    function rememberPreset(type, name) {
      const cleanName = normalizeMoneyName(name);
      if (!cleanName) return;
      const key = type === "expense" ? "expensePresets" : "extraProfitPresets";
      if (!Array.isArray(state[key])) state[key] = [];
      if (!state[key].some(item => normalizeMoneyName(item) === cleanName)) state[key].push(cleanName);
    }

    function forgetPreset(type, name) {
      const cleanName = normalizeMoneyName(name);
      if (!cleanName) return;
      const label = type === "expense" ? "지출" : "추가 수익";
      if (!confirm(`${label} 프리셋 '${cleanName}' 항목을 삭제할까요?`)) return;
      const key = type === "expense" ? "expensePresets" : "extraProfitPresets";
      state[key] = (state[key] || []).filter(item => normalizeMoneyName(item) !== cleanName);

      const inputId = type === "expense" ? "expenseName" : "extraProfitName";
      const input = document.getElementById(inputId);
      if (input && normalizeMoneyName(input.value) === cleanName) input.value = "";

      save();
      render();
    }

    function getCharacters() {
      if (!Array.isArray(state.characters)) state.characters = [];
      state.characters.forEach(normalizeCharacter);
      return state.characters;
    }

    function resetCharacterWeeklyProgress() {
      getCharacters().forEach(character => {
        character.tasks.forEach(task => {
          task.done = false;
          task.claimHistory = [];
          delete task.current;
          delete task.max;
        });
      });
    }

    function currentWeek() {
      return state.weeks[state.currentWeekKey];
    }

    function getTotalProfit(week = currentWeek()) {
      const base = Object.values(week.profit || {}).reduce((sum, value) => sum + Number(value || 0), 0);
      const extra = (week.extraProfit || []).reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const expense = (week.expense || []).reduce((sum, item) => sum + Number(item.amount || 0), 0);
      return base + extra - expense;
    }

    function getCharacterWeeklyProfit(character) {
      return (character.tasks || []).reduce((sum, task) => {
        return sum + (task.claimHistory || []).reduce((taskSum, record) => {
          return taskSum + Number(record.reward || 0);
        }, 0);
      }, 0);
    }

    function getWeeklyResetCountdownText() {
      const weekInfo = getWeekInfo();
      const resetTime = new Date(weekInfo.start);
      resetTime.setDate(resetTime.getDate() + 7);
      const diff = Math.max(0, resetTime.getTime() - Date.now());

      const dayMs = 24 * 60 * 60 * 1000;
      const hourMs = 60 * 60 * 1000;
      const minuteMs = 60 * 1000;

      const days = Math.floor(diff / dayMs);
      const hours = Math.floor((diff % dayMs) / hourMs);
      const minutes = Math.floor((diff % hourMs) / minuteMs);

      return `주간 초기화까지 : ${days}일 ${String(hours).padStart(2, "0")}시간 ${String(minutes).padStart(2, "0")}분`;
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function load() {
      const weekInfo = getWeekInfo();
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          Object.assign(state, parsed);
        } catch (e) {}
      }

      // v19 migration: 예전 버전은 캐릭터를 주차 안에 저장했기 때문에
      // 새 주차 생성 시 캐릭터가 사라질 수 있었다.
      // 저장되어 있던 주차 중 캐릭터가 남아있는 곳에서 전역 캐릭터 목록으로 옮긴다.
      if (!Array.isArray(state.characters) || state.characters.length === 0) {
        const currentWeekCharacters = state.weeks?.[state.currentWeekKey]?.characters;
        const fallbackWeek = Object.values(state.weeks || {}).find(week => Array.isArray(week.characters) && week.characters.length);
        state.characters = Array.isArray(currentWeekCharacters) && currentWeekCharacters.length
          ? currentWeekCharacters
          : (fallbackWeek?.characters || []);
      }
      getCharacters();
      normalizePresets();

      const previousKey = state.currentWeekKey;
      const changedWeek = Boolean(previousKey && previousKey !== weekInfo.key);
      if (changedWeek && state.weeks[previousKey]) {
        archiveWeek(previousKey);
      }

      state.currentWeekKey = weekInfo.key;
      state.currentWeekLabel = weekInfo.label;
      if (!state.weeks[state.currentWeekKey]) state.weeks[state.currentWeekKey] = emptyWeek(weekInfo.label, weekInfo.eraLabel);
      Object.values(state.weeks).forEach(normalizeWeek);
      state.weeks[state.currentWeekKey].label = weekInfo.label;
      state.weeks[state.currentWeekKey].eraLabel = weekInfo.eraLabel;

      // 주차가 바뀔 때 초기화되는 것은 진행도/체크/이번 주 수익뿐이다.
      // 캐릭터 명단, 오드 에너지, 충전 에너지, 추가한 숙제 목록은 유지한다.
      if (changedWeek) resetCharacterWeeklyProgress();

      if (!state.lastAetherRegenAt) state.lastAetherRegenAt = Date.now();
      applyAetherRegen();
      save();
    }

    function archiveWeek(weekKey) {
      const week = state.weeks[weekKey];
      if (!week) return;
      const total = getTotalProfit(week);
      const existing = state.history.find(h => h.key === weekKey);
      week.eraLabel = week.eraLabel || getEraWeekLabelFromKey(weekKey);
      const detail = {
        profit: { ...(week.profit || {}) },
        profitCount: { ...(week.profitCount || {}) },
        extraProfit: [...(week.extraProfit || [])],
        expense: [...(week.expense || [])]
      };
      if (existing) {
        existing.label = week.label;
        existing.eraLabel = week.eraLabel;
        existing.total = total;
        existing.detail = detail;
      } else {
        state.history.unshift({ key: weekKey, label: week.label, eraLabel: week.eraLabel, total, detail });
      }
    }

    function getRegenSlotTime(date) {
      // AION2 actual recovery 기준: 08 / 11 / 14 / 17 / 20 / 23 / 02 / 05
      // 날짜가 넘어가는 23시 → 02시 구간까지 안전하게 처리하기 위해
      // "오늘 몇 시" 계산이 아니라, 08:00 기준 절대 3시간 슬롯으로 계산한다.
      const target = date instanceof Date ? date : new Date(date);
      const base = new Date(target);
      base.setHours(8, 0, 0, 0);
      if (target.getTime() < base.getTime()) base.setDate(base.getDate() - 1);
      const threeHours = 3 * 60 * 60 * 1000;
      const ticks = Math.floor((target.getTime() - base.getTime()) / threeHours);
      return base.getTime() + ticks * threeHours;
    }

    function applyAetherRegen() {
      const week = currentWeek();
      if (!week) return;

      const REGEN_AMOUNT = 15;
      const THREE_HOURS = 3 * 60 * 60 * 1000;
      const now = Date.now();
      const currentSlot = getRegenSlotTime(new Date(now));

      // v13 migration:
      // 이전 버전은 8시 기준 변경 과정에서 저장된 마지막 회복 시간이 꼬일 수 있었다.
      // 패치 첫 실행 때는 기존 캐릭터/숙제 데이터는 유지하고, 회복 기준점만 현재 슬롯으로 재설정한다.
      // 이렇게 해야 모든 캐릭터에 +40 같은 잘못된 일괄 충전이 다시 발생하지 않는다.
      if (state.aetherRegenVersion !== 13) {
        state.lastAetherRegenAt = currentSlot;
        state.aetherRegenVersion = 13;
        return;
      }

      const lastSaved = Number(state.lastAetherRegenAt || 0);
      if (!lastSaved || lastSaved > now + 60 * 1000) {
        state.lastAetherRegenAt = currentSlot;
        return;
      }

      const lastSlot = getRegenSlotTime(new Date(lastSaved));
      const ticks = Math.floor((currentSlot - lastSlot) / THREE_HOURS);
      if (ticks <= 0) return;

      const gain = ticks * REGEN_AMOUNT;
      getCharacters().forEach(character => {
        character.maxAether = character.maxAether || 840;
        character.aether = Math.min(character.maxAether, Number(character.aether || 0) + gain);
      });
      state.lastAetherRegenAt = currentSlot;
    }

    function getNextRegenText() {
      const now = new Date();
      const next = new Date(getRegenSlotTime(now) + 3 * 60 * 60 * 1000);
      return `다음 오드 회복 ${String(next.getHours()).padStart(2, "0")}:00`;
    }

    function getTaskBaseName(taskName) {
      if (taskName.startsWith("[원정]")) return "[원정]";
      if (taskName.startsWith("[초월]")) return "[초월]";
      return taskName;
    }

    function taskOrder(task) {
      const base = getTaskBaseName(task.name);
      const idx = TASKS.findIndex(name => getTaskBaseName(name) === base || name === task.name);
      return idx === -1 ? 999 : idx;
    }

    function sortTasks(character) {
      character.tasks.sort((a, b) => {
        const doneDiff = Number(Boolean(a.done)) - Number(Boolean(b.done));
        if (doneDiff !== 0) return doneDiff;
        return taskOrder(a) - taskOrder(b);
      });
    }

    function addProfit(key, amount) {
      const week = currentWeek();
      if (!week.profitCount) week.profitCount = {};
      week.profit[key] = (week.profit[key] || 0) + amount;
      week.profitCount[key] = (week.profitCount[key] || 0) + 1;
      archiveWeek(state.currentWeekKey);
      save();
    }

    function removeProfit(key, amount) {
      const week = currentWeek();
      if (!week.profitCount) week.profitCount = {};
      week.profit[key] = Math.max(0, (week.profit[key] || 0) - amount);
      week.profitCount[key] = Math.max(0, (week.profitCount[key] || 0) - 1);
      if (week.profit[key] <= 0) delete week.profit[key];
      if (week.profitCount[key] <= 0) delete week.profitCount[key];
      archiveWeek(state.currentWeekKey);
      save();
    }

    function enableCardListDrag() {
      const slider = document.getElementById("cardList");
      if (!slider || slider.dataset.dragReady === "1") return;
      slider.dataset.dragReady = "1";

      let isDown = false;
      let startX = 0;
      let scrollLeft = 0;
      let moved = false;

      slider.addEventListener("pointerdown", (event) => {
        if (event.target.closest("button, input, select, textarea, .homework-item, .task-main, .task-label, .homework-list")) return;
        isDown = true;
        moved = false;
        startX = event.clientX;
        scrollLeft = slider.scrollLeft;
        slider.classList.add("dragging");
        slider.setPointerCapture(event.pointerId);
      });

      slider.addEventListener("pointermove", (event) => {
        if (!isDown) return;
        const dx = event.clientX - startX;
        if (Math.abs(dx) > 4) moved = true;
        slider.scrollLeft = scrollLeft - dx;
        if (moved) event.preventDefault();
      });

      const endDrag = (event) => {
        if (!isDown) return;
        isDown = false;
        slider.classList.remove("dragging");
        try { slider.releasePointerCapture(event.pointerId); } catch (_) {}
      };

      slider.addEventListener("pointerup", endDrag);
      slider.addEventListener("pointercancel", endDrag);
      slider.addEventListener("pointerleave", endDrag);

      slider.addEventListener("click", (event) => {
        if (!moved) return;
        event.preventDefault();
        event.stopPropagation();
        moved = false;
      }, true);
    }

    function render() {
      applyAetherRegen();
      const week = currentWeek();
      document.getElementById("weekRange").textContent = `${week.eraLabel || getEraWeekLabelFromKey(state.currentWeekKey)} : ${week.label}`;
      const resetCountdown = document.getElementById("resetCountdown");
      if (resetCountdown) resetCountdown.textContent = getWeeklyResetCountdownText();
      const cardList = document.getElementById("cardList");
      cardList.innerHTML = "";

      getCharacters().forEach(character => {
        sortTasks(character);
        cardList.appendChild(renderCharacter(character));
      });

      document.getElementById("weeklyExpedition").textContent = comma(week.weeklyExpedition);
      document.getElementById("weeklyTranscend").textContent = comma(week.weeklyTranscend);
      document.getElementById("aetherRegenNote").textContent = "";
      renderProfit();
      renderMoneyPresets();
      renderExtraProfit();
      renderExpense();
      renderHistory();
      save();
    }

    function renderCharacter(character) {
      const template = document.getElementById("characterTemplate");
      const card = template.content.cloneNode(true);

      card.querySelector(".nickname").textContent = character.nickname;
      card.querySelector(".power-value").textContent = formatPower(character.power);
      card.querySelector(".aether-value").textContent = `${comma(character.aether)} / ${comma(character.maxAether || 840)}`;
      card.querySelector(".bonus-value").textContent = `(+${comma(character.bonusAether)})`;
      const profitValue = card.querySelector(".character-profit-value");
      if (profitValue) profitValue.textContent = `${comma(getCharacterWeeklyProfit(character))} 키나`;

      card.querySelector(".edit-power").onclick = () => editPower(character.id);
      card.querySelector(".edit-energy").onclick = () => editCharacterEnergy(character.id);
      card.querySelector(".delete-character").onclick = () => deleteCharacter(character.id);
      card.querySelector(".move-left").onclick = () => moveCharacter(character.id, -1);
      card.querySelector(".move-right").onclick = () => moveCharacter(character.id, 1);
      card.querySelector(".small-charge").onclick = () => chargeEnergy(character.id, 10);
      card.querySelector(".large-charge").onclick = () => chargeEnergy(character.id, 40);

      const panel = card.querySelector(".add-task-panel");
      card.querySelector(".toggle-add-task").onclick = () => panel.classList.toggle("open");

      const taskGrid = card.querySelector(".task-grid");
      TASKS.forEach(taskName => {
        const button = document.createElement("button");
        button.className = "task-choice";
        button.textContent = taskName;
        button.onclick = () => addTask(character.id, taskName);
        taskGrid.appendChild(button);
      });

      const list = card.querySelector(".homework-list");
      character.tasks.forEach(task => list.appendChild(createTaskElement(character, task)));

      return card;
    }

    function createTaskElement(character, task) {
      task.name = normalizeTaskName(task.name);
      const baseName = getTaskBaseName(task.name);
      const isDungeon = DUNGEON_TASKS.includes(baseName);
      const item = document.createElement("div");
      item.className = "homework-item" + (isDungeon ? " dungeon-task" : "") + (task.done ? " done" : "");
      item.title = isDungeon ? "원정/초월은 체크박스 또는 보상 버튼을 사용합니다." : "클릭하면 체크 상태가 변경됩니다.";
      item.onclick = (event) => {
        if (isDungeon) return;
        if (event.target.closest("button, input, select, textarea")) return;
        task.done = !task.done;
        save();
        render();
      };

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = task.done;
      checkbox.onclick = event => event.stopPropagation();
      checkbox.onchange = () => {
        task.done = checkbox.checked;
        save();
        render();
      };

      const label = document.createElement("div");
      label.className = "task-label";
      label.textContent = getDisplayTaskName(task);

      item.appendChild(checkbox);

      if (isDungeon) {
        const stack = document.createElement("div");
        stack.className = "dungeon-stack";
        stack.appendChild(label);

        const select = document.createElement("select");
        select.className = "task-select";
        DUNGEONS[baseName].forEach(d => {
          const option = document.createElement("option");
          option.textContent = d.name;
          option.value = d.name;
          if (task.selectedDungeon === d.name) option.selected = true;
          select.appendChild(option);
        });
        select.onclick = event => event.stopPropagation();
        select.onchange = () => {
          task.selectedDungeon = select.value;
          save();
        };
        stack.appendChild(select);
        item.appendChild(stack);
      } else {
        const main = document.createElement("div");
        main.className = "task-main";
        main.appendChild(label);
        item.appendChild(main);
      }

      const actions = document.createElement("div");
      actions.style.display = "flex";
      actions.style.gap = "5px";
      actions.style.flexDirection = "column";

      if (isDungeon || SANCTUM_REWARDS[baseName] !== undefined) {
        const reward = document.createElement("button");
        reward.className = "reward-btn small-btn";
        reward.textContent = "보상";
        reward.onclick = (event) => {
          event.stopPropagation();
          claimReward(character.id, task.id);
        };
        actions.appendChild(reward);

        if ((task.claimHistory || []).length > 0) {
          const undo = document.createElement("button");
          undo.className = "undo-btn small-btn";
          undo.textContent = "취소";
          undo.onclick = (event) => {
            event.stopPropagation();
            undoReward(character.id, task.id);
          };
          actions.appendChild(undo);
        }
      } else {
        const deleteTask = document.createElement("button");
        deleteTask.className = "delete-task-btn small-btn delete-btn";
        deleteTask.textContent = "삭제";
        deleteTask.onclick = (event) => {
          event.stopPropagation();
          removeTask(character.id, task.id);
        };
        actions.appendChild(deleteTask);
      }

      item.appendChild(actions);

      return item;
    }

    function getDisplayTaskName(task) {
      return getTaskBaseName(task.name);
    }

    function addCharacter() {
      if (getCharacters().length >= 6) {
        alert("캐릭터는 최대 6개까지 등록할 수 있습니다.");
        return;
      }
      const nickname = prompt("추가할 캐릭터 닉네임을 입력하세요.");
      if (!nickname || !nickname.trim()) return;

      const currentAether = Number((prompt("현재 오드 에너지를 입력해주세요.", "0") || "0").replace(/,/g, ""));
      const currentBonus = Number((prompt("현재 충전 에너지를 입력해주세요.", "0") || "0").replace(/,/g, ""));

      getCharacters().push({
        id: uid(),
        nickname: nickname.trim(),
        power: 0,
        aether: currentAether || 0,
        maxAether: 840,
        bonusAether: currentBonus || 0,
        tasks: []
      });
      save();
      render();
    }

    function deleteCharacter(characterId) {
      const week = currentWeek();
      const character = getCharacters().find(c => c.id === characterId);
      if (!character) return;
      if (!confirm(`${character.nickname} 캐릭터를 삭제할까요?`)) return;
      state.characters = getCharacters().filter(c => c.id !== characterId);
      save();
      render();
    }

    function moveCharacter(characterId, direction) {
      const characters = getCharacters();
      const index = characters.findIndex(c => c.id === characterId);
      const nextIndex = index + direction;
      if (index < 0 || nextIndex < 0 || nextIndex >= characters.length) return;
      const [moved] = characters.splice(index, 1);
      characters.splice(nextIndex, 0, moved);
      save();
      render();
    }

    function editPower(characterId) {
      const character = getCharacters().find(c => c.id === characterId);
      const value = prompt("전투력을 입력하세요. 예: 512.1", character.power);
      if (value === null) return;
      character.power = Number(String(value).replace(/K|k|,/g, "")) || 0;
      save();
      render();
    }

    function editCharacterEnergy(characterId) {
      const character = getCharacters().find(c => c.id === characterId);
      if (!character) return;

      const aetherValue = prompt("현재 오드 에너지를 입력해주세요.", character.aether);
      if (aetherValue === null) return;

      const bonusValue = prompt("현재 충전 에너지를 입력해주세요.", character.bonusAether);
      if (bonusValue === null) return;

      character.aether = Math.max(0, Number(String(aetherValue).replace(/,/g, "")) || 0);
      character.maxAether = character.maxAether || 840;
      character.bonusAether = Math.max(0, Number(String(bonusValue).replace(/,/g, "")) || 0);
      save();
      render();
    }

    function chargeEnergy(characterId, amount) {
      const character = getCharacters().find(c => c.id === characterId);
      character.bonusAether += amount;
      save();
      render();
    }

    function addTask(characterId, taskName) {
      const character = getCharacters().find(c => c.id === characterId);
      const baseName = getTaskBaseName(taskName);
      if (character.tasks.some(t => getTaskBaseName(t.name) === baseName)) return;

      const task = { id: uid(), name: normalizeTaskName(taskName), done: false, claimHistory: [] };
      if (task.name === "[원정]") {
        task.selectedDungeon = DUNGEONS["[원정]"][0].name;
      }
      if (task.name === "[초월]") {
        task.selectedDungeon = DUNGEONS["[초월]"][0].name;
      }
      character.tasks.push(task);
      sortTasks(character);
      save();
      render();
    }

    function removeTask(characterId, taskId) {
      const character = getCharacters().find(c => c.id === characterId);
      const task = character?.tasks.find(t => t.id === taskId);
      if (!task) return;
      if ((task.claimHistory || []).length > 0) {
        alert("보상 기록이 있는 숙제는 먼저 횟수 취소를 해주세요.");
        return;
      }
      if (!confirm(`${getDisplayTaskName(task)} 숙제를 삭제할까요?`)) return;
      character.tasks = character.tasks.filter(t => t.id !== taskId);
      save();
      render();
    }

    function spendAether(character) {
      if ((Number(character.aether || 0) + Number(character.bonusAether || 0)) < 80) {
        alert("오드 에너지가 부족합니다.");
        return null;
      }

      let cost = 80;
      const spent = { aether: 0, bonusAether: 0 };
      if (character.aether >= cost) {
        character.aether -= cost;
        spent.aether = cost;
      } else {
        spent.aether = character.aether;
        cost -= character.aether;
        character.aether = 0;
        character.bonusAether -= cost;
        spent.bonusAether = cost;
      }
      return spent;
    }

    function refundAether(character, spent) {
      character.aether = Number(character.aether || 0) + Number(spent.aether || 0);
      character.bonusAether = Number(character.bonusAether || 0) + Number(spent.bonusAether || 0);
    }

    function claimReward(characterId, taskId) {
      const week = currentWeek();
      const character = getCharacters().find(c => c.id === characterId);
      const task = character.tasks.find(t => t.id === taskId);
      const baseName = getTaskBaseName(task.name);

      const spent = spendAether(character);
      if (!spent) return;
      if (!task.claimHistory) task.claimHistory = [];

      if (baseName === "[원정]") {
        const countedWeekly = week.weeklyExpedition < 84;
        if (countedWeekly) week.weeklyExpedition += 1;
        const dungeon = DUNGEONS["[원정]"].find(d => d.name === task.selectedDungeon) || DUNGEONS["[원정]"][0];
        const profitKey = `원정 ${dungeon.name}`;
        addProfit(profitKey, dungeon.reward);
        task.claimHistory.push({ type: "expedition", profitKey, reward: dungeon.reward, spent, countedWeekly });
      }

      if (baseName === "[초월]") {
        const countedWeekly = week.weeklyTranscend < 56;
        if (countedWeekly) week.weeklyTranscend += 1;
        const dungeon = DUNGEONS["[초월]"].find(d => d.name === task.selectedDungeon) || DUNGEONS["[초월]"][0];
        const profitKey = `초월 ${dungeon.name}`;
        addProfit(profitKey, dungeon.reward);
        task.claimHistory.push({ type: "transcend", profitKey, reward: dungeon.reward, spent, countedWeekly });
      }

      if (SANCTUM_REWARDS[baseName] !== undefined) {
        const profitKey = baseName;
        const reward = SANCTUM_REWARDS[baseName];
        addProfit(profitKey, reward);
        task.claimHistory.push({ type: "sanctum", profitKey, reward, spent });
      }

      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function undoReward(characterId, taskId) {
      const week = currentWeek();
      const character = getCharacters().find(c => c.id === characterId);
      const task = character?.tasks.find(t => t.id === taskId);
      if (!task || !(task.claimHistory || []).length) return;

      const record = task.claimHistory.pop();
      if (record.type === "expedition" && record.countedWeekly !== false) {
        week.weeklyExpedition = Math.max(0, week.weeklyExpedition - 1);
      }
      if (record.type === "transcend" && record.countedWeekly !== false) {
        week.weeklyTranscend = Math.max(0, week.weeklyTranscend - 1);
      }
      refundAether(character, record.spent || {});
      removeProfit(record.profitKey, record.reward || 0);
      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function renderProfitBox(el, rows) {
      const week = currentWeek();
      const counts = week.profitCount || {};
      el.innerHTML = "";
      rows.forEach(([key, value]) => {
        const row = document.createElement("div");
        row.className = "profit-row";
        row.innerHTML = `<span>${key} · ${comma(counts[key] || 0)}판</span><b>${comma(value)}</b>`;
        el.appendChild(row);
      });
      if (!el.innerHTML) el.innerHTML = `<div class="profit-row"><span>수익 없음 · 0판</span><b>0</b></div>`;
    }

    function renderProfit() {
      const week = currentWeek();
      const entries = Object.entries(week.profit || {});
      renderProfitBox(document.getElementById("expeditionProfit"), entries.filter(([key]) => key.startsWith("원정")));
      renderProfitBox(document.getElementById("transcendProfit"), entries.filter(([key]) => key.startsWith("초월")));
      renderProfitBox(document.getElementById("sanctumProfit"), entries.filter(([key]) => key.startsWith("[성역]")));
      document.getElementById("totalProfit").textContent = comma(getTotalProfit(week));
    }

    function addExtraProfit() {
      const nameInput = document.getElementById("extraProfitName");
      const amountInput = document.getElementById("extraProfitAmount");
      const name = normalizeMoneyName(nameInput.value);
      const amount = Number(String(amountInput.value || "0").replace(/,/g, ""));
      if (!name) {
        alert("추가 수익 항목명을 입력해주세요.");
        return;
      }
      if (!amount || amount <= 0) {
        alert("키나를 입력해주세요.");
        return;
      }
      addOrMergeMoneyRow(currentWeek().extraProfit, name, amount);
      rememberPreset("extraProfit", name);
      nameInput.value = "";
      amountInput.value = "";
      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function deleteExtraProfit(id) {
      const week = currentWeek();
      week.extraProfit = (week.extraProfit || []).filter(item => item.id !== id);
      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function addExpense() {
      const nameInput = document.getElementById("expenseName");
      const amountInput = document.getElementById("expenseAmount");
      const name = normalizeMoneyName(nameInput.value);
      const amount = Number(String(amountInput.value || "0").replace(/,/g, ""));
      if (!name) {
        alert("지출 항목명을 입력해주세요.");
        return;
      }
      if (!amount || amount <= 0) {
        alert("키나를 입력해주세요.");
        return;
      }
      addOrMergeMoneyRow(currentWeek().expense, name, amount);
      rememberPreset("expense", name);
      nameInput.value = "";
      amountInput.value = "";
      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function deleteExpense(id) {
      const week = currentWeek();
      week.expense = (week.expense || []).filter(item => item.id !== id);
      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function renderMoneyPresets() {
      normalizePresets();
      const renderChips = (boxId, names, inputId) => {
        const box = document.getElementById(boxId);
        if (!box) return;
        box.innerHTML = "";
        if (!names.length) {
          const empty = document.createElement("span");
          empty.className = "energy-pill";
          empty.textContent = "저장된 항목 없음";
          box.appendChild(empty);
          return;
        }
        names.forEach(name => {
          const type = inputId === "expenseName" ? "expense" : "extraProfit";
          const wrap = document.createElement("span");
          wrap.className = "preset-chip-wrap";

          const button = document.createElement("button");
          button.type = "button";
          button.className = "preset-chip";
          button.textContent = name;
          button.title = "항목 선택";
          button.onclick = () => {
            document.getElementById(inputId).value = name;
            const amountId = inputId === "expenseName" ? "expenseAmount" : "extraProfitAmount";
            document.getElementById(amountId).focus();
          };

          const del = document.createElement("button");
          del.type = "button";
          del.className = "preset-delete";
          del.textContent = "×";
          del.title = "프리셋 삭제";
          del.onclick = (event) => {
            event.stopPropagation();
            forgetPreset(type, name);
          };

          wrap.appendChild(button);
          wrap.appendChild(del);
          box.appendChild(wrap);
        });
      };
      renderChips("extraProfitPresetList", state.extraProfitPresets, "extraProfitName");
      renderChips("expensePresetList", state.expensePresets, "expenseName");
    }

    function renderExpense() {
      const box = document.getElementById("expenseList");
      box.innerHTML = "";
      const rows = currentWeek().expense || [];
      if (!rows.length) {
        box.innerHTML = `<div class="extra-profit-row"><span>기록 없음</span><b>0 키나</b><span></span></div>`;
        return;
      }
      rows.forEach(item => {
        const row = document.createElement("div");
        row.className = "extra-profit-row";
        const name = document.createElement("span");
        name.textContent = item.name;
        const amount = document.createElement("b");
        amount.textContent = `-${comma(item.amount)} 키나`;
        const del = document.createElement("button");
        del.className = "small-btn";
        del.textContent = "삭제";
        del.onclick = () => deleteExpense(item.id);
        row.appendChild(name);
        row.appendChild(amount);
        row.appendChild(del);
        box.appendChild(row);
      });
    }

    function renderExtraProfit() {
      const box = document.getElementById("extraProfitList");
      box.innerHTML = "";
      const rows = currentWeek().extraProfit || [];
      if (!rows.length) {
        box.innerHTML = `<div class="extra-profit-row"><span>기록 없음</span><b>0 키나</b><span></span></div>`;
        return;
      }
      rows.forEach(item => {
        const row = document.createElement("div");
        row.className = "extra-profit-row";
        const name = document.createElement("span");
        name.textContent = item.name;
        const amount = document.createElement("b");
        amount.textContent = `${comma(item.amount)} 키나`;
        const del = document.createElement("button");
        del.className = "small-btn";
        del.textContent = "삭제";
        del.onclick = () => deleteExtraProfit(item.id);
        row.appendChild(name);
        row.appendChild(amount);
        row.appendChild(del);
        box.appendChild(row);
      });
    }

    function addHistorySection(container, title, rows, options = {}) {
      const subtitle = document.createElement("div");
      subtitle.className = "history-subtitle";
      subtitle.textContent = title;
      container.appendChild(subtitle);

      if (!rows.length) {
        const empty = document.createElement("div");
        empty.className = "history-line";
        empty.innerHTML = `<span>기록 없음</span><b>0 키나</b>`;
        container.appendChild(empty);
        return;
      }

      rows.forEach(([name, amount, count]) => {
        const line = document.createElement("div");
        line.className = "history-line";
        const countText = typeof count === "number" ? ` · ${comma(count)}판` : "";
        const prefix = options.negative ? "-" : "";
        line.innerHTML = `<span>${name}${countText}</span><b>${prefix}${comma(amount)} 키나</b>`;
        container.appendChild(line);
      });
    }

    function renderHistory() {
      archiveWeek(state.currentWeekKey);
      const box = document.getElementById("profitHistory");
      const rows = [...state.history].sort((a, b) => b.key.localeCompare(a.key));
      box.innerHTML = "";
      if (!rows.length) {
        box.innerHTML = `<div class="history-row"><span>저장된 주차 수익 없음</span><b>0 키나</b></div>`;
        return;
      }
      rows.forEach(item => {
        const detail = item.detail || { profit: {}, profitCount: {}, extraProfit: [], expense: [] };
        const wrapper = document.createElement("details");
        wrapper.className = "history-detail";

        const summary = document.createElement("summary");
        summary.innerHTML = `<div class="history-row"><span>${item.eraLabel || getEraWeekLabelFromKey(item.key)}</span><b>${comma(item.total)} 키나</b></div>`;
        wrapper.appendChild(summary);

        const breakdown = document.createElement("div");
        breakdown.className = "history-breakdown";

        const profitEntries = Object.entries(detail.profit || {});
        const counts = detail.profitCount || {};
        addHistorySection(breakdown, "원정", profitEntries.filter(([key]) => key.startsWith("원정")).map(([key, value]) => [key, value, counts[key] || 0]));
        addHistorySection(breakdown, "초월", profitEntries.filter(([key]) => key.startsWith("초월")).map(([key, value]) => [key, value, counts[key] || 0]));
        addHistorySection(breakdown, "성역", profitEntries.filter(([key]) => key.startsWith("[성역]")).map(([key, value]) => [key, value, counts[key] || 0]));
        addHistorySection(breakdown, "추가 수익", (detail.extraProfit || []).map(row => [row.name, row.amount]));
        addHistorySection(breakdown, "지출", (detail.expense || []).map(row => [row.name, row.amount]), { negative: true });

        wrapper.appendChild(breakdown);
        box.appendChild(wrapper);
      });
    }

    function backupData() {
      archiveWeek(state.currentWeekKey);
      save();
      const today = new Date();
      const dateText = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `kinalog_backup_${dateText}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function restoreDataFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!parsed || typeof parsed !== "object") throw new Error("invalid");
          if (!confirm("현재 저장 데이터를 백업 파일 내용으로 덮어쓸까요?")) return;
          Object.keys(state).forEach(key => delete state[key]);
          Object.assign(state, parsed);
          normalizePresets();
          getCharacters();
          const weekInfo = getWeekInfo();
          state.currentWeekKey = weekInfo.key;
          state.currentWeekLabel = weekInfo.label;
          if (!state.weeks) state.weeks = {};
          if (!state.weeks[state.currentWeekKey]) state.weeks[state.currentWeekKey] = emptyWeek(weekInfo.label, weekInfo.eraLabel);
          Object.values(state.weeks).forEach(normalizeWeek);
          state.weeks[state.currentWeekKey].label = weekInfo.label;
      state.weeks[state.currentWeekKey].eraLabel = weekInfo.eraLabel;
          if (!state.history) state.history = [];
          if (!state.lastAetherRegenAt) state.lastAetherRegenAt = Date.now();
          save();
          render();
          alert("복원이 완료되었습니다.");
        } catch (e) {
          alert("복원할 수 없는 파일입니다. JSON 백업 파일을 확인해주세요.");
        }
      };
      reader.readAsText(file);
    }


    document.getElementById("addCharacterButton").onclick = addCharacter;
    document.getElementById("addExtraProfit").onclick = addExtraProfit;
    document.getElementById("addExpense").onclick = addExpense;
    document.getElementById("backupButton").onclick = backupData;
    document.getElementById("restoreButton").onclick = () => document.getElementById("restoreFile").click();
    document.getElementById("restoreFile").addEventListener("change", e => {
      restoreDataFromFile(e.target.files?.[0]);
      e.target.value = "";
    });
    document.getElementById("extraProfitAmount").addEventListener("keydown", e => {
      if (e.key === "Enter") addExtraProfit();
    });
    document.getElementById("extraProfitName").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("extraProfitAmount").focus();
    });
    document.getElementById("expenseAmount").addEventListener("keydown", e => {
      if (e.key === "Enter") addExpense();
    });
    document.getElementById("expenseName").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("expenseAmount").focus();
    });

    load();
    enableCardListDrag();
    render();
    setInterval(render, 60 * 1000);
  </script>
</body>
