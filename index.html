<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>키나로그</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="assets/favicon.ico" />
  <style>
    @font-face {
      font-family: "KinaLogFont";
      src: url("assets/NEXONLv1GothicRegular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #071527;
      --panel: #0f2138;
      --card: #102746;
      --card2: #0b1f38;
      --line: rgba(96, 165, 250, 0.46);
      --gold: #60a5fa;
      --gold2: #93c5fd;
      --text: #f8fafc;
      --muted: #9fb3c8;
      --danger: #f87171;
      --done: #4ade80;
      --body-bg: radial-gradient(circle at top, rgba(37, 99, 235, 0.38), transparent 34%), linear-gradient(180deg, #06101f 0%, var(--bg) 100%);
      --topbar-bg: transparent;
      --section-bg: rgba(15,33,56,.82);
      --card-bg: linear-gradient(180deg, rgba(16,39,70,.98), rgba(8,24,44,.98));
      --soft-bg: rgba(255,255,255,.05);
      --input-bg: #071527;
      --button-bg: linear-gradient(180deg, rgba(96,165,250,.22), rgba(37,99,235,.18));
      --shadow: 0 18px 50px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "KinaLogFont", "NEXON Lv1 Gothic", "Pretendard", "Malgun Gothic", sans-serif;
      background: var(--body-bg);
      color: var(--text);
      padding: 20px;
    }

    .app { max-width: 1640px; margin: 0 auto; }

    .topbar {
      padding: 16px 8px 18px;
      margin-bottom: 18px;
    }

    .brand-logo {
      display: block;
      width: min(700px, 90vw);
      max-height: 420px;
      object-fit: contain;
      margin: 0 auto;
      filter: drop-shadow(0 18px 34px rgba(37, 99, 235, .26));
    }

    .title {
      text-align: center;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--gold2);
      text-shadow: 0 0 14px rgba(37,99,235,.22);
    }


    .top-actions {
      margin-top: 2px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .week-range {
      margin-top: 0;
      text-align: right;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }

    .reset-countdown {
      margin-top: 4px;
      text-align: right;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }


    .utility-row {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .utility-row input[type="file"] { display: none; }

    .character-section, .weekly-section {
      border: 2px solid var(--line);
      background: var(--section-bg);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--gold2);
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-head .section-title { margin-bottom: 0; }

    .add-character-btn {
      min-width: 118px;
      padding: 9px 13px;
      color: var(--gold2);
    }

    .card-list {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-start;
      gap: 12px;
      padding: 4px 4px 10px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
      user-select: none;
    }

    .card-list.dragging {
      cursor: grabbing;
      scroll-snap-type: none;
    }

    .card-list::-webkit-scrollbar { height: 8px; }
    .card-list::-webkit-scrollbar-thumb {
      background: rgba(37, 99, 235, .35);
      border-radius: 999px;
    }

    .card-list::before, .card-list::after {
      content: "";
      flex: 0 0 max(4px, calc((100% - 1692px) / 2));
    }

    .character-card {
      position: relative;
      flex: 0 0 272px;
      max-width: 272px;
      min-width: 272px;
      scroll-snap-align: center;
      border: 2px solid var(--line);
      background: var(--card-bg);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 14px 34px rgba(15,23,42,.10), inset 0 0 18px rgba(37,99,235,.04);
    }

    .card-header {
      position: relative;
      min-height: 30px;
      margin-bottom: 8px;
      padding: 0 48px;
    }

    .nickname {
      text-align: center;
      font-size: 19px;
      font-weight: 900;
      color: var(--gold2);
      line-height: 1.25;
      word-break: keep-all;
    }

    .power-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 10px;
      text-align: center;
    }

    .power-text {
      min-width: 0;
    }

    .power-value {
      color: var(--text);
      font-size: 15px;
      margin-left: 4px;
    }

    .energy-line {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .energy-box {
      width: 100%;
      background: var(--soft-bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px 10px;
      text-align: center;
      font-weight: 900;
    }

    .energy-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .energy-main {
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
    }

    .energy-main .bonus-value {
      color: var(--gold2);
      white-space: nowrap;
    }

    .energy-pill {
      background: var(--soft-bg);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .energy-pill b { color: var(--text); }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--button-bg);
      color: var(--text);
      padding: 6px 8px;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .undo-btn {
      border-color: rgba(141,227,160,.35);
      color: #d7ffe0;
      background: rgba(141,227,160,.10);
    }

    button:hover { filter: brightness(1.12); }

    .small-btn {
      padding: 4px 7px;
      font-size: 11px;
    }

    .delete-btn {
      border-color: rgba(255,142,124,.35);
      color: #ffd1ca;
      background: rgba(255,142,124,.12);
    }

    .card-header .delete-btn {
      position: absolute;
      top: 0;
      right: 0;
    }

    .card-header .edit-energy {
      position: absolute;
      top: 0;
      left: 0;
    }

    .order-buttons {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 0 0 8px;
    }

    .order-buttons button {
      min-width: 42px;
      color: var(--gold2);
    }

    .delete-task-btn {
      position: static;
      align-self: center;
      white-space: nowrap;
    }

    .charge-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 12px;
    }

    .charge-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
      font-size: 13px;
      color: var(--gold2);
    }

    .charge-btn img {
      width: 25px;
      height: 25px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255,230,150,.35));
    }

    .charge-btn.large img { width: 30px; height: 30px; }

    .homework-area {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .character-weekly-profit {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .character-weekly-profit b {
      color: var(--text);
      white-space: nowrap;
    }


    .homework-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .homework-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--gold2);
    }

    .add-task-panel {
      display: none;
      margin: 10px 0;
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--soft-bg);
      border-radius: 12px;
    }

    .add-task-panel.open { display: block; }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
      gap: 7px;
    }

    .task-choice {
      text-align: left;
      font-size: 13px;
      background: var(--soft-bg);
    }

    .homework-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .homework-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      background: var(--soft-bg);
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 7px;
    }

    .homework-item.dungeon-task {
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: start;
    }

    .task-main {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .dungeon-stack {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .dungeon-stack .task-label {
      flex: 0 0 auto;
      text-align: left;
    }

    .homework-item.done .task-label {
      color: var(--muted);
      text-decoration: line-through;
    }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--done);
    }

    .task-label { font-weight: 900; font-size: 12px; line-height: 1.25; }

    .task-select {
      width: 100%;
      max-width: 132px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 7px;
      font-family: inherit;
      font-weight: 900;
      font-size: 11px;
    }

    .homework-item { cursor: pointer; }
    .homework-item select, .homework-item button, .homework-item input { cursor: pointer; }

    .homework-item:not(.dungeon-task):hover {
      background: rgba(96,165,250,.10);
    }


    .weekly-shared {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      text-align: right;
    }

    .weekly-title {
      color: var(--gold2);
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 0;
      white-space: nowrap;
    }

    .weekly-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat-pill {
      border: 1px solid var(--line);
      background: var(--soft-bg);
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 900;
    }

    .profit-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .profit-box {
      border: 2px solid var(--line);
      background: var(--card-bg);
      border-radius: 14px;
      padding: 14px;
      min-height: 120px;
    }

    .profit-title {
      color: var(--gold2);
      font-weight: 900;
      margin-bottom: 9px;
    }

    .profit-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.055);
      font-weight: 800;
      color: var(--muted);
    }

    .profit-row b { color: var(--text); }

    .extra-profit-section {
      margin-top: 14px;
      border: 2px solid var(--line);
      background: var(--card-bg);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
    }

    .fold-title {
      list-style: none;
      color: var(--gold2);
      font-size: 14px;
      font-weight: 900;
      padding: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .fold-title::-webkit-details-marker { display: none; }

    .fold-title::after {
      content: "+";
      color: var(--gold2);
      font-size: 18px;
      line-height: 1;
    }

    details[open] > .fold-title::after { content: "−"; }

    .fold-body {
      padding: 0 13px 13px;
    }

    .extra-profit-title {
      color: var(--gold2);
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .preset-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .preset-chip-wrap {
      display: inline-flex;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(96,165,250,.10);
    }

    .preset-chip {
      border: 0;
      border-radius: 0;
      padding: 7px 10px;
      font-size: 12px;
      color: var(--gold2);
      background: transparent;
    }

    .preset-delete {
      border: 0;
      border-left: 1px solid var(--line);
      border-radius: 0;
      padding: 7px 8px;
      font-size: 12px;
      color: #ffd1ca;
      background: rgba(255,142,124,.10);
    }

    .extra-profit-form {
      display: grid;
      grid-template-columns: 1.3fr 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .extra-profit-form input {
      width: 100%;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-family: inherit;
      font-weight: 900;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .extra-profit-form input::-webkit-outer-spin-button,
    .extra-profit-form input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .extra-profit-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.055);
      color: var(--muted);
      font-weight: 900;
    }

    .extra-profit-row b { color: var(--text); white-space: nowrap; }

    .total-profit {
      margin-top: 14px;
      text-align: right;
      color: var(--gold2);
      font-size: 22px;
      font-weight: 900;
    }

    .aether-note { display: none; }

    .history-section {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 15px;
    }

    .history-title {
      color: var(--gold2);
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .history-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.055);
      color: var(--muted);
      font-weight: 900;
    }

    .history-row b { color: var(--text); white-space: nowrap; }

    .history-detail {
      border-bottom: 1px solid rgba(255,255,255,.055);
    }

    .history-detail summary {
      list-style: none;
      cursor: pointer;
    }

    .history-detail summary::-webkit-details-marker { display: none; }

    .history-detail .history-row {
      border-bottom: 0;
    }

    .history-detail summary .history-row span::before {
      content: "▸ ";
      color: var(--gold2);
    }

    .history-detail[open] summary .history-row span::before { content: "▾ "; }

    .history-breakdown {
      padding: 0 0 10px 18px;
      display: grid;
      gap: 7px;
    }

    .history-subtitle {
      color: var(--gold2);
      font-size: 12px;
      font-weight: 900;
      margin-top: 6px;
    }

    .history-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .history-line b { color: var(--text); white-space: nowrap; }



    .tab-remote {
      position: fixed;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border: 2px solid var(--line);
      border-radius: 18px;
      background: rgba(7, 21, 39, .88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .tab-btn {
      width: 104px;
      min-height: 44px;
      border-radius: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.045);
    }

    .tab-btn.active {
      color: var(--text);
      border-color: rgba(147,197,253,.9);
      background: linear-gradient(180deg, rgba(96,165,250,.35), rgba(37,99,235,.28));
      box-shadow: inset 0 0 18px rgba(96,165,250,.12), 0 0 18px rgba(37,99,235,.18);
    }

    .tab-page { display: none; }
    .tab-page.active { display: block; }

    .growth-section, .memo-section {
      border: 2px solid var(--line);
      background: var(--section-bg);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .growth-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .growth-card {
      border: 2px solid var(--line);
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
    }

    .growth-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .growth-title-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .growth-name {
      color: var(--gold2);
      font-size: 20px;
      font-weight: 900;
    }

    .growth-power-inline {
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      border: 1px solid var(--line);
      background: var(--soft-bg);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .growth-summary {
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      text-align: right;
      line-height: 1.7;
    }

    .growth-body {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 300px;
      gap: 12px;
      align-items: stretch;
    }

    .growth-history {
      height: 430px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      padding: 12px;
      overflow-y: auto;
      min-width: 0;
    }

    .growth-history::-webkit-scrollbar { width: 8px; }
    .growth-history::-webkit-scrollbar-thumb {
      background: rgba(37, 99, 235, .35);
      border-radius: 999px;
    }

    .growth-history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 0 0 9px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .growth-average {
      color: var(--gold2);
      white-space: nowrap;
    }

    .growth-history-rows {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .growth-history-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 86px 94px;
      gap: 10px;
      align-items: center;
      border: 1px solid rgba(96,165,250,.22);
      background: rgba(255,255,255,.035);
      border-radius: 10px;
      padding: 9px 10px;
      font-weight: 900;
      min-height: 38px;
    }

    .growth-history-week {
      color: var(--muted);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .growth-history-power {
      color: var(--text);
      text-align: right;
      white-space: nowrap;
      font-size: 13px;
    }

    .growth-delta {
      text-align: right;
      white-space: nowrap;
      font-size: 13px;
    }

    .growth-delta.up { color: var(--done); }
    .growth-delta.down { color: var(--danger); }
    .growth-delta.flat { color: var(--muted); }

    .stigma-area {
      align-self: stretch;
      height: 430px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.035);
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-width: 0;
    }

    .stigma-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .stigma-title {
      color: var(--gold2);

  <script>
    const STORAGE_KEY = "aion2_weekly_checklist_v2";
    const TASKS = [
      "각성전", "지령서", "일일던전", "어비스 지령서", "어비스 회랑", "[원정]", "[초월]",
      "[성역] 루드라", "[성역] 바고트", "[성역] 칼드릭스",
      "[산들바람] 오드 에너지", "[산들바람] 펫 영혼결정",
      "[산들바람] 일던 도전권", "[산들바람] 일던 즉완권",
      "[산들바람] 악몽 즉완권", "[물질변환] 오드 에너지"
    ];

    const DUNGEON_TASKS = ["[원정]", "[초월]"];

    function makeReward(normal = 0, bound = 0, aetherCost = 80) {
      return { normal: Number(normal || 0), bound: Number(bound || 0), aetherCost: Number(aetherCost ?? 80) };
    }

    const DUNGEONS = {
      "[원정]": [
        { name: "4티어 보통", reward: makeReward(600000, 600000, 80) },
        { name: "4티어 어려움", reward: makeReward(1620000, 0, 80) },
        { name: "5티어 보통", reward: makeReward(1620000, 0, 80) },
        { name: "5티어 어려움", reward: makeReward(2010000, 0, 80) },
        { name: "6티어 보통", reward: makeReward(2010000, 0, 80) },
        { name: "6티어 어려움", reward: makeReward(3600000, 0, 120) }
      ],
      "[초월]": [
        { name: "2티어 1단계", reward: makeReward(600000, 600000, 80) },
        { name: "3티어 1단계", reward: makeReward(1500000, 0, 80) },
        { name: "3티어 2단계", reward: makeReward(1710000, 0, 80) },
        { name: "3티어 3단계", reward: makeReward(2010000, 0, 80) },
        { name: "3티어 4단계", reward: makeReward(2400000, 0, 80) },
        { name: "4티어 1단계", reward: makeReward(1710000, 0, 80) },
        { name: "4티어 2단계", reward: makeReward(2010000, 0, 80) },
        { name: "4티어 3단계", reward: makeReward(2400000, 0, 80) },
        { name: "4티어 4단계", reward: makeReward(4200000, 0, 120) }
      ]
    };

    const SANCTUM_REWARDS = {
      "[성역] 루드라": makeReward(2000000, 2000000, 160),
      "[성역] 바고트": makeReward(8000000, 0, 160),
      "[성역] 칼드릭스": makeReward(12000000, 0, 160)
    };

    const AWAKENING_SCORE_TABLE = [
      { score: 14000, shards: 48 },
      { score: 13000, shards: 48 },
      { score: 12000, shards: 48 },
      { score: 11000, shards: 46 },
      { score: 10000, shards: 44 }
    ];

    const state = {
      currentWeekKey: "",
      currentWeekLabel: "",
      lastAetherRegenAt: Date.now(),
      aetherRegenVersion: 13,
      characters: [],
      weeks: {},
      history: [],
      extraProfitPresets: [],
      expensePresets: [],
      activeTab: "checklist",
      growth: { lastRecordedWeekKey: "", abyssRecords: [], lastAbyssPromptKey: "", awakeningScore: 12000 },
      memos: []
    };

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function comma(n) {
      return Number(n || 0).toLocaleString();
    }

    function formatPower(value) {
      return `${Number(value || 0).toFixed(1)}K`;
    }

    const MAX_STIGMA_COUNT = 13;

    function getSortedCharacters() {
      return [...getCharacters()].sort((a, b) => Number(b.power || 0) - Number(a.power || 0));
    }

    function ensureGrowthState() {
      if (!state.growth || typeof state.growth !== "object") state.growth = {};
      if (!Array.isArray(state.growth.abyssRecords)) state.growth.abyssRecords = [];
      if (!state.growth.lastAbyssPromptKey) state.growth.lastAbyssPromptKey = "";
      if (typeof state.growth.awakeningScore !== "number") state.growth.awakeningScore = 12000;
      getCharacters().forEach(character => {
        if (!Array.isArray(character.powerHistory)) character.powerHistory = [];
        if (typeof character.awakeningScore !== "number") character.awakeningScore = Number(state.growth?.awakeningScore || 12000);
        if (!Array.isArray(character.stigmas)) {
          character.stigmas = [];
        }
        character.stigmas = character.stigmas.slice(0, MAX_STIGMA_COUNT);
        character.stigmas.forEach(stigma => {
          if (!stigma.id) stigma.id = uid();
          stigma.name = String(stigma.name || "");
          stigma.level = Math.max(0, Math.min(20, Number(stigma.level || 0)));
        });
      });
      if (!Array.isArray(state.memos)) state.memos = [];
      state.memos.forEach(memo => {
        if (!memo.id) memo.id = uid();
        if (!memo.title) memo.title = "메모";
        if (typeof memo.sortMode !== "boolean") memo.sortMode = false;
        if (!Array.isArray(memo.blocks)) {
          const type = memo.type || "note";
          const block = { id: uid(), type, content: memo.content || "", items: Array.isArray(memo.items) ? memo.items : [] };
          memo.blocks = [block];
          delete memo.type;
          delete memo.content;
          delete memo.items;
        }
        memo.blocks.forEach(block => {
          if (!block.id) block.id = uid();
          if (!block.type) block.type = "note";
          if (block.type === "checklist") {
            const firstItem = Array.isArray(block.items) ? block.items[0] : null;
            block.type = "check";
            block.text = firstItem?.text || block.content || "";
            block.done = Boolean(firstItem?.done);
            delete block.items;
          }
          if (block.type === "check" && typeof block.text !== "string") block.text = "";
          if (block.type === "check" && typeof block.done !== "boolean") block.done = false;
          if (!Array.isArray(block.items)) block.items = [];
          if (typeof block.content !== "string") block.content = "";
        });
      });
    }

    function getAverageAbyssCount() {
      ensureGrowthState();
      const rows = state.growth.abyssRecords || [];
      if (!rows.length) return 0;
      return rows.reduce((sum, row) => sum + Number(row.count || 0), 0) / rows.length;
    }

    function getAwakeningRewardShards(score = 0) {
      const value = Number(score || 0);
      const row = AWAKENING_SCORE_TABLE.find(item => value >= item.score);
      return row ? row.shards : 0;
    }

    function getCharacterAwakeningScore(character) {
      return Number(character?.awakeningScore ?? state.growth?.awakeningScore ?? 12000);
    }

    function getAwakeningStigmaIncome(character) {
      return getAwakeningRewardShards(getCharacterAwakeningScore(character)) * 3 / 48;
    }

    function getWeeklyAbyssIncome() {
      return getAverageAbyssCount() * 2;
    }

    function getWeeklyStigmaIncome(character) {
      return getWeeklyAbyssIncome() + getAwakeningStigmaIncome(character);
    }

    const STIGMA_LEVEL_COST = Array.from({ length: 21 }, (_, level) => {
      if (level <= 0) return 0;
      if (level <= 5) return 1;
      if (level <= 10) return 2;
      if (level <= 15) return 4;
      return 8;
    });

    function getRemainingStigmaShards(character) {
      ensureGrowthState();
      return (character.stigmas || []).reduce((sum, stigma) => {
        const level = Math.max(0, Math.min(20, Number(stigma.level || 0)));
        let need = 0;
        for (let next = level + 1; next <= 20; next++) need += STIGMA_LEVEL_COST[next] || 0;
        return sum + need;
      }, 0);
    }

    function recordPowerSnapshot(weekKey, force = false) {
      ensureGrowthState();
      const key = weekKey || state.currentWeekKey || getWeekInfo().key;
      if (!key) return;
      getCharacters().forEach(character => {
        if (!Array.isArray(character.powerHistory)) character.powerHistory = [];
        const existing = character.powerHistory.find(row => row.weekKey === key);
        const row = { weekKey: key, label: getEraWeekLabelFromKey(key), power: Number(character.power || 0), recordedAt: Date.now() };
        if (existing) {
          if (force) Object.assign(existing, row);
        } else {
          character.powerHistory.push(row);
        }
        character.powerHistory.sort((a, b) => String(a.weekKey).localeCompare(String(b.weekKey)));
      });
      state.growth.lastRecordedWeekKey = key;
    }

    function resetAbyssHallTasks() {
      getCharacters().forEach(character => {
        (character.tasks || []).forEach(task => {
          if (normalizeTaskName(task.name) === "어비스 회랑") {
            task.done = false;
            task.claimHistory = [];
          }
        });
      });
    }

    function maybePromptAbyssResult() {
      ensureGrowthState();
      const now = new Date();
      const day = now.getDay();
      if (day !== 0 && day !== 4) return;
      const key = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
      if (state.growth.lastAbyssPromptKey === key) return;
      let value = "";
      while (true) {
        value = prompt("아티팩트 점령전 결과를 입력해주세요\n이번 회랑에서 획득한 개수를 숫자로 입력하면 평균 회랑 개수 계산에 반영됩니다.", "");
        const clean = String(value ?? "").replace(/,/g, "").trim();
        if (clean !== "" && !Number.isNaN(Number(clean)) && Number(clean) >= 0) {
          value = clean;
          break;
        }
        alert("숫자를 입력해야 팝업이 종료됩니다.");
      }
      state.growth.lastAbyssPromptKey = key;
      const count = Math.max(0, Number(value) || 0);
      state.growth.abyssRecords.push({ id: uid(), key, count, recordedAt: Date.now() });
      resetAbyssHallTasks();
      save();
    }


    function formatKoreanDate(date) {
      return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`;
    }

    function getWeekInfo(date = new Date()) {
      // AION2 주간 초기화 기준: 매주 수요일 오전 5시
      // 05:00 이전 시간은 아직 이전 주차로 본다.
      const shifted = new Date(date.getTime() - 5 * 60 * 60 * 1000);
      const day = shifted.getDay();
      const diffToWednesday = (day - 3 + 7) % 7;
      const start = new Date(shifted);
      start.setHours(5, 0, 0, 0);
      start.setDate(shifted.getDate() - diffToWednesday);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      const key = `${start.getFullYear()}-${String(start.getMonth() + 1).padStart(2, "0")}-${String(start.getDate()).padStart(2, "0")}`;
      const label = `${formatKoreanDate(start)} ~ ${formatKoreanDate(end)}`;
      const eraLabel = getEraWeekLabel(start);
      return { key, label, eraLabel, start, end };
    }

    function makeDate(year, month, day) {
      const date = new Date(year, month - 1, day);
      date.setHours(5, 0, 0, 0);
      return date;
    }

    function getEraWeekLabel(dateLike) {
      const date = dateLike instanceof Date ? dateLike : new Date(dateLike);
      const chapter1Start = makeDate(2026, 7, 1);
      const season3Start = makeDate(2026, 4, 8);
      const oneWeek = 7 * 24 * 60 * 60 * 1000;
      if (date.getTime() >= chapter1Start.getTime()) {
        return `챕터1 · ${Math.floor((date.getTime() - chapter1Start.getTime()) / oneWeek) + 1}주차`;
      }
      if (date.getTime() >= season3Start.getTime()) {
        return `시즌3 · ${Math.floor((date.getTime() - season3Start.getTime()) / oneWeek) + 1}주차`;
      }
      return `${formatKoreanDate(date)}`;
    }

    function getEraWeekLabelFromKey(key) {
      if (!key) return "기록";
      const [year, month, day] = key.split("-").map(Number);
      if (!year || !month || !day) return "기록";
      return getEraWeekLabel(makeDate(year, month, day));
    }

    function emptyWeek(label, eraLabel = "") {
      return { label, eraLabel, weeklyExpedition: 0, weeklyTranscend: 0, profit: {}, profitCount: {}, extraProfit: [], expense: [] };
    }

    function normalizeCharacter(character) {
      if (!character.tasks) character.tasks = [];
      if (!character.maxAether) character.maxAether = 840;
      if (typeof character.aether !== "number") character.aether = Number(character.aether || 0);
      if (typeof character.bonusAether !== "number") character.bonusAether = Number(character.bonusAether || 0);
      character.tasks.forEach(task => {
        if (!task.claimHistory) task.claimHistory = [];
        task.name = normalizeTaskName(task.name);
        if (task.name === "[원정]" && (!task.selectedDungeon || !DUNGEONS["[원정]"].some(d => d.name === task.selectedDungeon))) task.selectedDungeon = DUNGEONS["[원정]"][0].name;
        if (task.name === "[초월]" && (!task.selectedDungeon || !DUNGEONS["[초월]"].some(d => d.name === task.selectedDungeon))) task.selectedDungeon = DUNGEONS["[초월]"][0].name;
        delete task.current;
        delete task.max;
      });
    }

    function normalizeTaskName(taskName) {
      let name = String(taskName || "").trim();
      if (name.startsWith("[원정]")) return "[원정]";
      if (name.startsWith("[초월]")) return "[초월]";
      if (name === "일던") return "일일던전";
      name = name.replace(/일일던전 즉시완료권/g, "일던 즉완권");
      name = name.replace(/즉시완료권/g, "즉완권");
      return name;
    }

    function normalizeMoneyName(name) {
      return String(name || "").replace(/\s+/g, " ").trim();
    }

    function mergeMoneyRows(rows) {
      const merged = [];
      (rows || []).forEach(item => {
        const name = normalizeMoneyName(item.name);
        const amount = Number(item.amount || 0);
        if (!name || !amount) return;
        const existing = merged.find(row => row.name === name);
        if (existing) {
          existing.amount += amount;
        } else {
          merged.push({ id: item.id || uid(), name, amount });
        }
      });
      return merged;
    }

    function addOrMergeMoneyRow(rows, name, amount) {
      const cleanName = normalizeMoneyName(name);
      const existing = rows.find(item => normalizeMoneyName(item.name) === cleanName);
      if (existing) {
        existing.name = cleanName;
        existing.amount = Number(existing.amount || 0) + Number(amount || 0);
      } else {
        rows.push({ id: uid(), name: cleanName, amount: Number(amount || 0) });
      }
    }

    function normalizeWeek(week) {
      if (!week.profit) week.profit = {};
      if (!week.profitCount) week.profitCount = {};
      if (!week.extraProfit) week.extraProfit = [];
      if (!week.expense) week.expense = [];
      week.extraProfit = mergeMoneyRows(week.extraProfit);
      week.expense = mergeMoneyRows(week.expense);
      if (typeof week.weeklyExpedition !== "number") week.weeklyExpedition = 0;
      if (typeof week.weeklyTranscend !== "number") week.weeklyTranscend = 0;
      if (!week.eraLabel) week.eraLabel = getEraWeekLabelFromKey(Object.keys(state.weeks || {}).find(key => state.weeks[key] === week));
      // 시즌3 및 구버전 기록 보호: 숫자 하나로 저장된 기존 보상은 normalizeReward()에서 전부 일반 키나로 처리한다.
      // 따라서 챕터1 보상표가 일반/각인으로 바뀌어도 과거 역대 수익은 각인 키나로 재분류되지 않는다.
      // 예전 버전 호환용. 캐릭터는 이제 주차 데이터가 아니라 전역 데이터로 보관한다.
      delete week.characters;
    }

    function normalizePresets() {
      if (!Array.isArray(state.extraProfitPresets)) state.extraProfitPresets = [];
      if (!Array.isArray(state.expensePresets)) state.expensePresets = [];
      state.extraProfitPresets = [...new Set(state.extraProfitPresets.map(v => String(v || "").trim()).filter(Boolean))];
      state.expensePresets = [...new Set(state.expensePresets.map(v => String(v || "").trim()).filter(Boolean))];
    }

    function rememberPreset(type, name) {
      const cleanName = normalizeMoneyName(name);
      if (!cleanName) return;
      const key = type === "expense" ? "expensePresets" : "extraProfitPresets";
      if (!Array.isArray(state[key])) state[key] = [];
      if (!state[key].some(item => normalizeMoneyName(item) === cleanName)) state[key].push(cleanName);
    }

    function forgetPreset(type, name) {
      const cleanName = normalizeMoneyName(name);
      if (!cleanName) return;
      const label = type === "expense" ? "지출" : "추가 수익";
      if (!confirm(`${label} 프리셋 '${cleanName}' 항목을 삭제할까요?`)) return;
      const key = type === "expense" ? "expensePresets" : "extraProfitPresets";
      state[key] = (state[key] || []).filter(item => normalizeMoneyName(item) !== cleanName);

      const inputId = type === "expense" ? "expenseName" : "extraProfitName";
      const input = document.getElementById(inputId);
      if (input && normalizeMoneyName(input.value) === cleanName) input.value = "";

      save();
      render();
    }

    function getCharacters() {
      if (!Array.isArray(state.characters)) state.characters = [];
      state.characters.forEach(normalizeCharacter);
      return state.characters;
    }

    function resetCharacterWeeklyProgress() {
      getCharacters().forEach(character => {
        character.tasks.forEach(task => {
          if (normalizeTaskName(task.name) !== "어비스 회랑") {
            task.done = false;
            task.claimHistory = [];
          }
          delete task.current;
          delete task.max;
        });
      });
    }

    function currentWeek() {
      return state.weeks[state.currentWeekKey];
    }

    function normalizeReward(reward) {
      if (typeof reward === "number") {
        const normal = Number(reward || 0);
        return { normal, bound: 0, aetherCost: 0 };
      }
      if (!reward || typeof reward !== "object") return { normal: 0, bound: 0, aetherCost: 0 };
      const normal = Number(reward.normal || 0);
      const bound = Number(reward.bound || 0);
      const hasAetherCost = Object.prototype.hasOwnProperty.call(reward, "aetherCost");
      return { normal, bound, aetherCost: hasAetherCost ? Number(reward.aetherCost ?? 0) : 0 };
    }

    function isBoundKinaName(name) {
      const compact = String(name || "").replace(/\s+/g, "");
      return compact.includes("각인키나");
    }

    function getMoneyRowReward(item, options = {}) {
      const amount = Number(item?.amount || 0);
      if (options.expense) return { normal: -amount, bound: 0, aetherCost: 0 };
      return isBoundKinaName(item?.name)
        ? { normal: 0, bound: amount, aetherCost: 0 }
        : { normal: amount, bound: 0, aetherCost: 0 };
    }

    function rewardTotal(reward) {
      const row = normalizeReward(reward);
      return row.normal + row.bound;
    }

    function addRewards(a, b) {
      const left = normalizeReward(a);
      const right = normalizeReward(b);
      return { normal: left.normal + right.normal, bound: left.bound + right.bound, aetherCost: Number(right.aetherCost || left.aetherCost || 0) };
    }

    function subtractRewards(a, b) {
      const left = normalizeReward(a);
      const right = normalizeReward(b);
      const normal = Math.max(0, left.normal - right.normal);
      const bound = Math.max(0, left.bound - right.bound);
      return { normal, bound, aetherCost: normal + bound > 0 ? Number(left.aetherCost || right.aetherCost || 0) : 0 };
    }

    function getProfitTotals(week = currentWeek()) {
      const base = Object.values(week?.profit || {}).reduce((sum, value) => {
        const reward = normalizeReward(value);
        sum.normal += reward.normal;
        sum.bound += reward.bound;
        return sum;
      }, { normal: 0, bound: 0 });

      (week?.extraProfit || []).forEach(item => {
        const reward = getMoneyRowReward(item);
        base.normal += reward.normal;
        base.bound += reward.bound;
      });

      (week?.expense || []).forEach(item => {
        base.normal += getMoneyRowReward(item, { expense: true }).normal;
      });

      base.normal = Math.max(0, base.normal);
      base.bound = Math.max(0, base.bound);
      base.total = base.normal + base.bound;
      return base;
    }
    function getTotalProfit(week = currentWeek()) {
      return getProfitTotals(week).total;
    }

    function getCharacterWeeklyProfitReward(character) {
      return (character.tasks || []).reduce((sum, task) => {
        return (task.claimHistory || []).reduce((taskSum, record) => addRewards(taskSum, record.reward || 0), sum);
      }, { normal: 0, bound: 0, aetherCost: 0 });
    }

    function getCharacterWeeklyProfit(character) {
      return rewardTotal(getCharacterWeeklyProfitReward(character));
    }

    function getWeeklyResetCountdownText() {
      const weekInfo = getWeekInfo();
      const resetTime = new Date(weekInfo.start);
      resetTime.setDate(resetTime.getDate() + 7);
      const diff = Math.max(0, resetTime.getTime() - Date.now());

      const dayMs = 24 * 60 * 60 * 1000;
      const hourMs = 60 * 60 * 1000;
      const minuteMs = 60 * 1000;

      const days = Math.floor(diff / dayMs);
      const hours = Math.floor((diff % dayMs) / hourMs);
      const minutes = Math.floor((diff % hourMs) / minuteMs);

      return `주간 초기화까지 : ${days}일 ${String(hours).padStart(2, "0")}시간 ${String(minutes).padStart(2, "0")}분`;
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function load() {
      const weekInfo = getWeekInfo();
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          Object.assign(state, parsed);
        } catch (e) {}
      }

      // v19 migration: 예전 버전은 캐릭터를 주차 안에 저장했기 때문에
      // 새 주차 생성 시 캐릭터가 사라질 수 있었다.
      // 저장되어 있던 주차 중 캐릭터가 남아있는 곳에서 전역 캐릭터 목록으로 옮긴다.
      if (!Array.isArray(state.characters) || state.characters.length === 0) {
        const currentWeekCharacters = state.weeks?.[state.currentWeekKey]?.characters;
        const fallbackWeek = Object.values(state.weeks || {}).find(week => Array.isArray(week.characters) && week.characters.length);
        state.characters = Array.isArray(currentWeekCharacters) && currentWeekCharacters.length
          ? currentWeekCharacters
          : (fallbackWeek?.characters || []);
      }
      getCharacters();
      normalizePresets();
      ensureGrowthState();

      const previousKey = state.currentWeekKey;
      const changedWeek = Boolean(previousKey && previousKey !== weekInfo.key);
      if (changedWeek && state.weeks[previousKey]) {
        recordPowerSnapshot(previousKey, true);
        archiveWeek(previousKey);
      }

      state.currentWeekKey = weekInfo.key;
      state.currentWeekLabel = weekInfo.label;
      if (!state.weeks[state.currentWeekKey]) state.weeks[state.currentWeekKey] = emptyWeek(weekInfo.label, weekInfo.eraLabel);
      Object.values(state.weeks).forEach(normalizeWeek);
      state.weeks[state.currentWeekKey].label = weekInfo.label;
      state.weeks[state.currentWeekKey].eraLabel = weekInfo.eraLabel;

      // 주차가 바뀔 때 초기화되는 것은 진행도/체크/이번 주 수익뿐이다.
      // 캐릭터 명단, 오드 에너지, 충전 에너지, 추가한 숙제 목록은 유지한다.
      if (changedWeek) resetCharacterWeeklyProgress();

      if (!state.lastAetherRegenAt) state.lastAetherRegenAt = Date.now();
      if (!state.growth.lastRecordedWeekKey) recordPowerSnapshot(state.currentWeekKey, false);
      applyAetherRegen();
      save();
    }

    function archiveWeek(weekKey) {
      const week = state.weeks[weekKey];
      if (!week) return;
      const total = getTotalProfit(week);
      const existing = state.history.find(h => h.key === weekKey);
      week.eraLabel = week.eraLabel || getEraWeekLabelFromKey(weekKey);
      const detail = {
        profit: { ...(week.profit || {}) },
        profitCount: { ...(week.profitCount || {}) },
        extraProfit: [...(week.extraProfit || [])],
        expense: [...(week.expense || [])]
      };
      if (existing) {
        existing.label = week.label;
        existing.eraLabel = week.eraLabel;
        existing.total = total;
        existing.detail = detail;
      } else {
        state.history.unshift({ key: weekKey, label: week.label, eraLabel: week.eraLabel, total, detail });
      }
    }

    function getRegenSlotTime(date) {
      // AION2 actual recovery 기준: 08 / 11 / 14 / 17 / 20 / 23 / 02 / 05
      // 날짜가 넘어가는 23시 → 02시 구간까지 안전하게 처리하기 위해
      // "오늘 몇 시" 계산이 아니라, 08:00 기준 절대 3시간 슬롯으로 계산한다.
      const target = date instanceof Date ? date : new Date(date);
      const base = new Date(target);
      base.setHours(8, 0, 0, 0);
      if (target.getTime() < base.getTime()) base.setDate(base.getDate() - 1);
      const threeHours = 3 * 60 * 60 * 1000;
      const ticks = Math.floor((target.getTime() - base.getTime()) / threeHours);
      return base.getTime() + ticks * threeHours;
    }

    function applyAetherRegen() {
      const week = currentWeek();
      if (!week) return;

      const REGEN_AMOUNT = 15;
      const THREE_HOURS = 3 * 60 * 60 * 1000;
      const now = Date.now();
      const currentSlot = getRegenSlotTime(new Date(now));

      // v13 migration:
      // 이전 버전은 8시 기준 변경 과정에서 저장된 마지막 회복 시간이 꼬일 수 있었다.
      // 패치 첫 실행 때는 기존 캐릭터/숙제 데이터는 유지하고, 회복 기준점만 현재 슬롯으로 재설정한다.
      // 이렇게 해야 모든 캐릭터에 +40 같은 잘못된 일괄 충전이 다시 발생하지 않는다.
      if (state.aetherRegenVersion !== 13) {
        state.lastAetherRegenAt = currentSlot;
        state.aetherRegenVersion = 13;
        return;
      }

      const lastSaved = Number(state.lastAetherRegenAt || 0);
      if (!lastSaved || lastSaved > now + 60 * 1000) {
        state.lastAetherRegenAt = currentSlot;
        return;
      }

      const lastSlot = getRegenSlotTime(new Date(lastSaved));
      const ticks = Math.floor((currentSlot - lastSlot) / THREE_HOURS);
      if (ticks <= 0) return;

      const gain = ticks * REGEN_AMOUNT;
      getCharacters().forEach(character => {
        character.maxAether = character.maxAether || 840;
        character.aether = Math.min(character.maxAether, Number(character.aether || 0) + gain);
      });
      state.lastAetherRegenAt = currentSlot;
    }

    function getNextRegenText() {
      const now = new Date();
      const next = new Date(getRegenSlotTime(now) + 3 * 60 * 60 * 1000);
      return `다음 오드 회복 ${String(next.getHours()).padStart(2, "0")}:00`;
    }

    function getTaskBaseName(taskName) {
      if (taskName.startsWith("[원정]")) return "[원정]";
      if (taskName.startsWith("[초월]")) return "[초월]";
      return taskName;
    }

    function taskOrder(task) {
      const base = getTaskBaseName(task.name);
      const idx = TASKS.findIndex(name => getTaskBaseName(name) === base || name === task.name);
      return idx === -1 ? 999 : idx;
    }

    function sortTasks(character) {
      character.tasks.sort((a, b) => {
        const doneDiff = Number(Boolean(a.done)) - Number(Boolean(b.done));
        if (doneDiff !== 0) return doneDiff;
        return taskOrder(a) - taskOrder(b);
      });
    }

    function addProfit(key, amount) {
      const week = currentWeek();
      if (!week.profitCount) week.profitCount = {};
      week.profit[key] = addRewards(week.profit[key] || 0, amount);
      week.profitCount[key] = (week.profitCount[key] || 0) + 1;
      archiveWeek(state.currentWeekKey);
      save();
    }

    function removeProfit(key, amount) {
      const week = currentWeek();
      if (!week.profitCount) week.profitCount = {};
      week.profit[key] = subtractRewards(week.profit[key] || 0, amount);
      week.profitCount[key] = Math.max(0, (week.profitCount[key] || 0) - 1);
      if (rewardTotal(week.profit[key]) <= 0) delete week.profit[key];
      if (week.profitCount[key] <= 0) delete week.profitCount[key];
      archiveWeek(state.currentWeekKey);
      save();
    }

    function enableCardListDrag() {
      const slider = document.getElementById("cardList");
      if (!slider || slider.dataset.dragReady === "1") return;
      slider.dataset.dragReady = "1";

      let isDown = false;
      let startX = 0;
      let scrollLeft = 0;
      let moved = false;

      slider.addEventListener("pointerdown", (event) => {
        if (event.target.closest("button, input, select, textarea, .homework-item, .task-main, .task-label, .homework-list")) return;
        isDown = true;
        moved = false;
        startX = event.clientX;
        scrollLeft = slider.scrollLeft;
        slider.classList.add("dragging");
        slider.setPointerCapture(event.pointerId);
      });

      slider.addEventListener("pointermove", (event) => {
        if (!isDown) return;
        const dx = event.clientX - startX;
        if (Math.abs(dx) > 4) moved = true;
        slider.scrollLeft = scrollLeft - dx;
        if (moved) event.preventDefault();
      });

      const endDrag = (event) => {
        if (!isDown) return;
        isDown = false;
        slider.classList.remove("dragging");
        try { slider.releasePointerCapture(event.pointerId); } catch (_) {}
      };

      slider.addEventListener("pointerup", endDrag);
      slider.addEventListener("pointercancel", endDrag);
      slider.addEventListener("pointerleave", endDrag);

      slider.addEventListener("click", (event) => {
        if (!moved) return;
        event.preventDefault();
        event.stopPropagation();
        moved = false;
      }, true);
    }

    function render() {
      applyAetherRegen();
      const week = currentWeek();
      document.getElementById("weekRange").textContent = `${week.eraLabel || getEraWeekLabelFromKey(state.currentWeekKey)} : ${week.label}`;
      const resetCountdown = document.getElementById("resetCountdown");
      if (resetCountdown) resetCountdown.textContent = getWeeklyResetCountdownText();
      const cardList = document.getElementById("cardList");
      cardList.innerHTML = "";

      getSortedCharacters().forEach(character => {
        sortTasks(character);
        cardList.appendChild(renderCharacter(character));
      });

      document.getElementById("weeklyExpedition").textContent = comma(week.weeklyExpedition);
      document.getElementById("weeklyTranscend").textContent = comma(week.weeklyTranscend);
      document.getElementById("aetherRegenNote").textContent = "";
      renderProfit();
      renderEfficiencyTable();
      renderMoneyPresets();
      renderExtraProfit();
      renderExpense();
      renderHistory();
      renderTabs();
      renderGrowth();
      renderMemos();
      maybePromptAbyssResult();
      save();
    }

    function renderCharacter(character) {
      const template = document.getElementById("characterTemplate");
      const card = template.content.cloneNode(true);

      card.querySelector(".nickname").textContent = character.nickname;
      card.querySelector(".power-value").textContent = formatPower(character.power);
      card.querySelector(".aether-value").textContent = `${comma(character.aether)} / ${comma(character.maxAether || 840)}`;
      card.querySelector(".bonus-value").textContent = `(+${comma(character.bonusAether)})`;
      const profitValue = card.querySelector(".character-profit-value");
      if (profitValue) {
        const charReward = getCharacterWeeklyProfitReward(character);
        profitValue.innerHTML = `
          <span class="character-profit-lines">
            <span>일반 ${comma(charReward.normal)}</span>
            <span>각인 ${comma(charReward.bound)}</span>
            <b>총합 ${comma(rewardTotal(charReward))}</b>
          </span>`;
      }

      card.querySelector(".edit-power").onclick = () => editPower(character.id);
      card.querySelector(".edit-energy").onclick = () => editCharacterEnergy(character.id);
      card.querySelector(".delete-character").onclick = () => deleteCharacter(character.id);
      card.querySelector(".small-charge").onclick = () => chargeEnergy(character.id, 10);
      card.querySelector(".large-charge").onclick = () => chargeEnergy(character.id, 40);

      const panel = card.querySelector(".add-task-panel");
      card.querySelector(".toggle-add-task").onclick = () => panel.classList.toggle("open");

      const taskGrid = card.querySelector(".task-grid");
      TASKS.forEach(taskName => {
        const button = document.createElement("button");
        button.className = "task-choice";
        button.textContent = taskName;
        button.onclick = () => addTask(character.id, taskName);
        taskGrid.appendChild(button);
      });

      const list = card.querySelector(".homework-list");
      character.tasks.forEach(task => list.appendChild(createTaskElement(character, task)));

      return card;
    }

    function createTaskElement(character, task) {
      task.name = normalizeTaskName(task.name);
      const baseName = getTaskBaseName(task.name);
      const isDungeon = DUNGEON_TASKS.includes(baseName);
      const item = document.createElement("div");
      item.className = "homework-item" + (isDungeon ? " dungeon-task" : "") + (task.done ? " done" : "");
      item.title = isDungeon ? "원정/초월은 체크박스 또는 보상 버튼을 사용합니다." : "클릭하면 체크 상태가 변경됩니다.";
      item.onclick = (event) => {
        if (isDungeon) return;
        if (event.target.closest("button, input, select, textarea")) return;
        task.done = !task.done;
        save();
        render();
      };

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = task.done;
      checkbox.onclick = event => event.stopPropagation();
      checkbox.onchange = () => {
        task.done = checkbox.checked;
        save();
        render();
      };

      const label = document.createElement("div");
      label.className = "task-label";
      label.textContent = getDisplayTaskName(task);

      item.appendChild(checkbox);

      if (isDungeon) {
        const stack = document.createElement("div");
        stack.className = "dungeon-stack";
        stack.appendChild(label);

        const select = document.createElement("select");
        select.className = "task-select";
        DUNGEONS[baseName].forEach(d => {
          const option = document.createElement("option");
          option.textContent = d.name;
          option.value = d.name;
          if (task.selectedDungeon === d.name) option.selected = true;
          select.appendChild(option);
        });
        select.onclick = event => event.stopPropagation();
        select.onchange = () => {
          task.selectedDungeon = select.value;
          save();
        };
        stack.appendChild(select);
        item.appendChild(stack);
      } else {
        const main = document.createElement("div");
        main.className = "task-main";
        main.appendChild(label);
        item.appendChild(main);
      }

      const actions = document.createElement("div");
      actions.style.display = "flex";
      actions.style.gap = "5px";
      actions.style.flexDirection = "column";

      if (isDungeon || SANCTUM_REWARDS[baseName] !== undefined) {
        const reward = document.createElement("button");
        reward.className = "reward-btn small-btn";
        reward.textContent = "보상";
        reward.onclick = (event) => {
          event.stopPropagation();
          claimReward(character.id, task.id);
        };
        actions.appendChild(reward);

        if ((task.claimHistory || []).length > 0) {
          const undo = document.createElement("button");
          undo.className = "undo-btn small-btn";
          undo.textContent = "취소";
          undo.onclick = (event) => {
            event.stopPropagation();
            undoReward(character.id, task.id);
          };
          actions.appendChild(undo);
        }
      } else {
        const deleteTask = document.createElement("button");
        deleteTask.className = "delete-task-btn small-btn delete-btn";
        deleteTask.textContent = "삭제";
        deleteTask.onclick = (event) => {
          event.stopPropagation();
          removeTask(character.id, task.id);
        };
        actions.appendChild(deleteTask);
      }

      item.appendChild(actions);

      return item;
    }

    function getDisplayTaskName(task) {
      return getTaskBaseName(task.name);
    }

    function addCharacter() {
      if (getCharacters().length >= 7) {
        alert("캐릭터는 최대 7개까지 등록할 수 있습니다.");
        return;
      }
      const nickname = prompt("추가할 캐릭터 닉네임을 입력하세요.");
      if (!nickname || !nickname.trim()) return;

      const currentAether = Number((prompt("현재 오드 에너지를 입력해주세요.", "0") || "0").replace(/,/g, ""));
      const currentBonus = Number((prompt("현재 충전 에너지를 입력해주세요.", "0") || "0").replace(/,/g, ""));

      getCharacters().push({
        id: uid(),
        nickname: nickname.trim(),
        power: 0,
        aether: currentAether || 0,
        maxAether: 840,
        bonusAether: currentBonus || 0,
        tasks: []
      });
      save();
      render();
    }

    function deleteCharacter(characterId) {
      const week = currentWeek();
      const character = getCharacters().find(c => c.id === characterId);
      if (!character) return;
      if (!confirm(`${character.nickname} 캐릭터를 삭제할까요?`)) return;
      state.characters = getCharacters().filter(c => c.id !== characterId);
      save();
      render();
    }

    function moveCharacter(characterId, direction) {
      const characters = getCharacters();
      const index = characters.findIndex(c => c.id === characterId);
      const nextIndex = index + direction;
      if (index < 0 || nextIndex < 0 || nextIndex >= characters.length) return;
      const [moved] = characters.splice(index, 1);
      characters.splice(nextIndex, 0, moved);
      save();
      render();
    }

    function editPower(characterId) {
      const character = getCharacters().find(c => c.id === characterId);
      const value = prompt("전투력을 입력하세요. 예: 512.1", character.power);
      if (value === null) return;
      character.power = Number(String(value).replace(/K|k|,/g, "")) || 0;
      save();
      render();
    }

    function editCharacterEnergy(characterId) {
      const character = getCharacters().find(c => c.id === characterId);
      if (!character) return;

      const aetherValue = prompt("현재 오드 에너지를 입력해주세요.", character.aether);
      if (aetherValue === null) return;

      const bonusValue = prompt("현재 충전 에너지를 입력해주세요.", character.bonusAether);
      if (bonusValue === null) return;

      character.aether = Math.max(0, Number(String(aetherValue).replace(/,/g, "")) || 0);
      character.maxAether = character.maxAether || 840;
      character.bonusAether = Math.max(0, Number(String(bonusValue).replace(/,/g, "")) || 0);
      save();
      render();
    }

    function chargeEnergy(characterId, amount) {
      const character = getCharacters().find(c => c.id === characterId);
      character.bonusAether += amount;
      save();

    function addTask(characterId, taskName) {
      const character = getCharacters().find(c => c.id === characterId);
      const baseName = getTaskBaseName(taskName);
      if (character.tasks.some(t => getTaskBaseName(t.name) === baseName)) return;

      const task = { id: uid(), name: normalizeTaskName(taskName), done: false, claimHistory: [] };
      if (task.name === "[원정]") {
        task.selectedDungeon = DUNGEONS["[원정]"][0].name;
      }
      if (task.name === "[초월]") {
        task.selectedDungeon = DUNGEONS["[초월]"][0].name;
      }
      character.tasks.push(task);
      sortTasks(character);
      save();
      render();
    }

    function removeTask(characterId, taskId) {
      const character = getCharacters().find(c => c.id === characterId);
      const task = character?.tasks.find(t => t.id === taskId);
      if (!task) return;
      if ((task.claimHistory || []).length > 0) {
        alert("보상 기록이 있는 숙제는 먼저 횟수 취소를 해주세요.");
        return;
      }
      if (!confirm(`${getDisplayTaskName(task)} 숙제를 삭제할까요?`)) return;
      character.tasks = character.tasks.filter(t => t.id !== taskId);
      save();
      render();
    }

    function spendAether(character, amount = 80) {
      const required = Number(amount ?? 80);
      if (required <= 0) return { aether: 0, bonusAether: 0 };
      if ((Number(character.aether || 0) + Number(character.bonusAether || 0)) < required) {
        alert(`오드 에너지가 부족합니다. 필요 오드: ${required}`);
        return null;
      }

      let cost = required;
      const spent = { aether: 0, bonusAether: 0 };
      if (character.aether >= cost) {
        character.aether -= cost;
        spent.aether = cost;
      } else {
        spent.aether = character.aether;
        cost -= character.aether;
        character.aether = 0;
        character.bonusAether -= cost;
        spent.bonusAether = cost;
      }
      return spent;
    }

    function refundAether(character, spent) {
      const maxAether = Number(character.maxAether || 840);
      character.aether = Math.min(maxAether, Number(character.aether || 0) + Number(spent.aether || 0));
      character.bonusAether = Number(character.bonusAether || 0) + Number(spent.bonusAether || 0);
    }

    function claimReward(characterId, taskId) {
      const week = currentWeek();
      const character = getCharacters().find(c => c.id === characterId);
      const task = character.tasks.find(t => t.id === taskId);
      const baseName = getTaskBaseName(task.name);
      if (!task.claimHistory) task.claimHistory = [];

      let reward = null;
      let profitKey = "";
      let recordType = "";
      let countedWeekly = false;

      if (baseName === "[원정]") {
        countedWeekly = week.weeklyExpedition < 84;
        const dungeon = DUNGEONS["[원정]"].find(d => d.name === task.selectedDungeon) || DUNGEONS["[원정]"][0];
        reward = normalizeReward(dungeon.reward);
        profitKey = `원정 ${dungeon.name}`;
        recordType = "expedition";
      }

      if (baseName === "[초월]") {
        countedWeekly = week.weeklyTranscend < 56;
        const dungeon = DUNGEONS["[초월]"].find(d => d.name === task.selectedDungeon) || DUNGEONS["[초월]"][0];
        reward = normalizeReward(dungeon.reward);
        profitKey = `초월 ${dungeon.name}`;
        recordType = "transcend";
      }

      if (SANCTUM_REWARDS[baseName] !== undefined) {
        if ((task.claimHistory || []).length >= 1) {
          alert("성역 보상은 주간 1회만 기록합니다.");
          return;
        }
        reward = normalizeReward(SANCTUM_REWARDS[baseName]);
        profitKey = baseName;
        recordType = "sanctum";
      }

      if (!reward) return;
      const spent = spendAether(character, reward.aetherCost);
      if (!spent) return;

      if (recordType === "expedition" && countedWeekly) week.weeklyExpedition += 1;
      if (recordType === "transcend" && countedWeekly) week.weeklyTranscend += 1;

      addProfit(profitKey, reward);
      task.claimHistory.push({ type: recordType, profitKey, reward, spent, countedWeekly });
      if (recordType === "sanctum") task.done = true;

      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function undoReward(characterId, taskId) {
      const week = currentWeek();
      const character = getCharacters().find(c => c.id === characterId);
      const task = character?.tasks.find(t => t.id === taskId);
      if (!task || !(task.claimHistory || []).length) return;

      const record = task.claimHistory.pop();
      if (record.type === "expedition" && record.countedWeekly !== false) {
        week.weeklyExpedition = Math.max(0, week.weeklyExpedition - 1);
      }
      if (record.type === "transcend" && record.countedWeekly !== false) {
        week.weeklyTranscend = Math.max(0, week.weeklyTranscend - 1);
      }
      refundAether(character, record.spent || {});
      removeProfit(record.profitKey, record.reward || 0);
      if (record.type === "sanctum") task.done = false;
      archiveWeek(state.currentWeekKey);
      save();
      render();
    }

    function getEfficiencyPer10(reward) {
      const row = normalizeReward(reward);
      if (!row.aetherCost) return 0;
      return Math.round((row.normal + row.bound) / row.aetherCost * 10);
    }

    function getEfficiencyRows() {

      Object.entries(SANCTUM_REWARDS).forEach(([name, reward]) => rows.push({ name, reward: normalizeReward(reward) }));
      return rows.sort((a, b) => getEfficiencyPer10(b.reward) - getEfficiencyPer10(a.reward));

    function getDetailTotals(detail) {
      const base = Object.values(detail?.profit || {}).reduce((sum, value) => {
        const reward = normalizeReward(value);
        sum.normal += reward.normal;
        sum.bound += reward.bound;
        return sum;
      }, { normal: 0, bound: 0 });

      (detail?.extraProfit || []).forEach(item => {
        const reward = getMoneyRowReward(item);
        base.normal += reward.normal;
        base.bound += reward.bound;
      });

      (detail?.expense || []).forEach(item => {
        base.normal += getMoneyRowReward(item, { expense: true }).normal;
      });

      base.normal = Math.max(0, base.normal);
      base.bound = Math.max(0, base.bound);
      base.total = base.normal + base.bound;
      return base;
    }

    function getWeeklyAverageGrowth(history) {
      const rows = (history || []).filter(row => typeof row.power !== "undefined");
      if (rows.length < 2) return 0;
      let sum = 0;
      for (let i = 1; i < rows.length; i++) {
        sum += Number(rows[i].power || 0) - Number(rows[i - 1].power || 0);
      }
      return sum / (rows.length - 1);
    }

    function clampChartPan(pan, plotW, plotH, contentW) {
      const minX = Math.min(0, plotW - contentW);
      const maxX = 0;
      const maxY = Math.max(12, plotH * 0.28);
      return {
        x: Math.max(minX, Math.min(maxX, Number(pan?.x || 0))),
        y: Math.max(-maxY, Math.min(maxY, Number(pan?.y || 0)))
      };
    }

    function drawPowerChart(canvas, history) {
      if (!canvas) return;
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(420, Math.floor(rect.width || canvas.parentElement.clientWidth || 720));
      const height = Math.max(260, Math.floor(rect.height || canvas.parentElement.clientHeight || 310));
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const pad = { left: 50, right: 20, top: 22, bottom: 36 };
      const rows = (history || []).slice(-28);
      let pan = canvas._chartPan || { x: 0, y: 0 };
      ctx.font = "12px KinaLogFont, Malgun Gothic, sans-serif";
      ctx.lineWidth = 1;
      ctx.strokeStyle = "rgba(96,165,250,.25)";
      ctx.fillStyle = "rgba(159,179,200,.9)";
      for (let i = 0; i < 4; i++) {
        const y = pad.top + ((height - pad.top - pad.bottom) / 3) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
      }
      if (rows.length < 2) {
        ctx.fillStyle = "rgba(159,179,200,.9)";
        ctx.textAlign = "center";
        ctx.fillText("전투력 데이터가 2주 이상 쌓이면 그래프가 표시됩니다.", width / 2, height / 2);
        canvas._powerPoints = [];
        return;
      }
      const values = rows.map(r => Number(r.power || 0));
      let min = Math.min(...values);
      let max = Math.max(...values);
      const margin = Math.max(2, (max - min) * .14);
      min -= margin;
      max += margin;
      if (min === max) { min -= 1; max += 1; }
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const contentW = Math.max(plotW, (rows.length - 1) * 92);
      pan = clampChartPan(pan, plotW, plotH, contentW);
      canvas._chartPan = pan;
      const points = rows.map((row, i) => {
        const x = pad.left + (contentW * i / Math.max(1, rows.length - 1)) + pan.x;
        const y = pad.top + plotH - ((Number(row.power || 0) - min) / (max - min)) * plotH + pan.y;
        const prev = i > 0 ? Number(rows[i - 1].power || 0) : null;
        const delta = prev === null ? 0 : Number(row.power || 0) - prev;
        return { x, y, row, delta };
      });
      canvas._powerPoints = points;
      ctx.save();
      ctx.beginPath();
      ctx.rect(pad.left, pad.top, plotW, plotH);
      ctx.clip();
      ctx.strokeStyle = "rgba(147,197,253,.95)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.stroke();
      points.forEach((p, i) => {
        ctx.fillStyle = i === points.length - 1 ? "#bfdbfe" : "#93c5fd";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
      ctx.fillStyle = "rgba(159,179,200,.95)";
      ctx.textAlign = "right";
      ctx.fillText(formatPower(max), pad.left - 8, pad.top + 4);
      ctx.fillText(formatPower(min), pad.left - 8, height - pad.bottom + 4);
      ctx.textAlign = "center";
      points.forEach((p, i) => {
        if ((i === 0 || i === points.length - 1 || rows.length <= 6) && p.x >= pad.left && p.x <= width - pad.right) {
          ctx.fillText(String(p.row.label || p.row.weekKey).replace("챕터1 · ", "C1 ").replace("시즌3 · ", "S3 "), p.x, height - 12);
        }
      });

      if (!canvas.dataset.tooltipReady) {
        canvas.dataset.tooltipReady = "1";
        let dragging = false;
        let startX = 0;
        let startY = 0;
        let basePan = { x: 0, y: 0 };
        canvas.addEventListener("pointerdown", event => {
          dragging = true;
          canvas.parentElement.classList.add("dragging");
          startX = event.clientX;
          startY = event.clientY;
          basePan = { ...(canvas._chartPan || { x: 0, y: 0 }) };
          canvas.setPointerCapture(event.pointerId);
        });
        canvas.addEventListener("pointermove", event => {
          if (dragging) {
            const rect = canvas.getBoundingClientRect();
            const w = Math.max(420, Math.floor(rect.width || canvas.parentElement.clientWidth || 720));
            const h = Math.max(260, Math.floor(rect.height || canvas.parentElement.clientHeight || 292));
            const plotW = w - 50 - 20;
            const plotH = h - 22 - 36;
            const contentW = Math.max(plotW, ((history || []).slice(-28).length - 1) * 92);
            canvas._chartPan = clampChartPan({ x: basePan.x + event.clientX - startX, y: basePan.y + event.clientY - startY }, plotW, plotH, contentW);
            drawPowerChart(canvas, history);
            return;
          }
          const tooltip = canvas.parentElement.querySelector(".chart-tooltip");
          const pts = canvas._powerPoints || [];
          if (!tooltip || !pts.length) return;
          const box = canvas.getBoundingClientRect();
          const x = event.clientX - box.left;
          const y = event.clientY - box.top;
          let nearest = null;
          let minDist = Infinity;
          pts.forEach(point => {
            const dist = Math.hypot(point.x - x, point.y - y);
            if (dist < minDist) { minDist = dist; nearest = point; }
          });
          if (!nearest || minDist > 20) {
            tooltip.style.display = "none";
            return;
          }
          const up = nearest.delta >= 0;
          const deltaText = `${nearest.delta >= 0 ? "" : "-"}${Math.abs(nearest.delta).toFixed(1)}K ${up ? "🔼" : "🔽"}`;
          tooltip.innerHTML = `${nearest.row.label || nearest.row.weekKey}<br><b>${formatPower(nearest.row.power)}</b><br><span class="${up ? "up" : "down"}">${deltaText}</span>`;
          tooltip.style.left = `${nearest.x}px`;
          tooltip.style.top = `${nearest.y}px`;
          tooltip.style.display = "block";
        });
        const endDrag = event => {
          if (!dragging) return;
          dragging = false;
          canvas.parentElement.classList.remove("dragging");
          try { canvas.releasePointerCapture(event.pointerId); } catch (_) {}
        };
        canvas.addEventListener("pointerup", endDrag);
        canvas.addEventListener("pointercancel", endDrag);
        canvas.addEventListener("mouseleave", () => {
          const tooltip = canvas.parentElement.querySelector(".chart-tooltip");
          if (tooltip) tooltip.style.display = "none";
        });
      }
    }

        return;
      }
      rows.forEach((row, index) => {

          diff.textContent = `0.0K`;

        item.appendChild(week);
        item.appendChild(power);
        item.appendChild(diff);
        container.appendChild(item);
      });
    }

          Object.keys(state).forEach(key => delete state[key]);
          Object.assign(state, parsed);
          normalizePresets();
          getCharacters();

          const weekInfo = getWeekInfo();
          state.currentWeekKey = weekInfo.key;
          state.currentWeekLabel = weekInfo.label;
          if (!state.weeks) state.weeks = {};
          if (!state.weeks[state.currentWeekKey]) state.weeks[state.currentWeekKey] = emptyWeek(weekInfo.label, weekInfo.eraLabel);
          Object.values(state.weeks).forEach(normalizeWeek);
          state.weeks[state.currentWeekKey].label = weekInfo.label;
      state.weeks[state.currentWeekKey].eraLabel = weekInfo.eraLabel;
          if (!state.history) state.history = [];
          if (!state.lastAetherRegenAt) state.lastAetherRegenAt = Date.now();
          save();
          render();
          alert("복원이 완료되었습니다.");

          alert("복원할 수 없는 파일입니다. JSON 백업 파일을 확인해주세요.");
        }
      };
      reader.readAsText(file);
    }



    document.querySelectorAll(".tab-btn").forEach(button => {
      button.onclick = () => setActiveTab(button.dataset.tab);
    });
    document.getElementById("addMemoButton").onclick = addMemo;

    document.getElementById("addCharacterButton").onclick = addCharacter;
    document.getElementById("addExtraProfit").onclick = addExtraProfit;
    document.getElementById("addExpense").onclick = addExpense;
    document.getElementById("backupButton").onclick = backupData;
    document.getElementById("restoreButton").onclick = () => document.getElementById("restoreFile").click();
    document.getElementById("restoreFile").addEventListener("change", e => {
      restoreDataFromFile(e.target.files?.[0]);
      e.target.value = "";
    });
    document.getElementById("extraProfitAmount").addEventListener("keydown", e => {
      if (e.key === "Enter") addExtraProfit();
    });
    document.getElementById("extraProfitName").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("extraProfitAmount").focus();
    });
    document.getElementById("expenseAmount").addEventListener("keydown", e => {
      if (e.key === "Enter") addExpense();
    });
    document.getElementById("expenseName").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("expenseAmount").focus();
    });

    load();
    enableCardListDrag();
    enableHorizontalDragScroll("growthList", "button, input, select, textarea, canvas");
    render();
    setInterval(render, 60 * 1000);
    window.addEventListener("resize", () => renderGrowth());
  </script>
</body>
</html>
